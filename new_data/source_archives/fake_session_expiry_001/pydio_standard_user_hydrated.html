c/u\u003e [On|Off]: display a maintenance page on this endpoint, although Cells is running.\u003c/li\u003e\n\u003c/ol\u003e\u003c/div\u003e","ajxp_admin.sites.details.note":"\u003cdiv\u003e\u003ci\u003eAdditional notes\u003c/i\u003e\n\u003col\u003e\n\u003cli\u003e1. When there are no sites defined, Cells use a default configuration (https://0.0.0.0:8080 with self-signed).\u003c/li\u003e\n\u003cli\u003e2. Sites can be overridden at runtime by using ‘--bind’ flag or ‘CELLS_BIND’ environment variable.\n\u003c/li\u003e\n\u003c/ol\u003e\u003c/div\u003e","ajxp_admin.sites.detected.sites":"Sites currently detected","ajxp_admin.sites.enter-to-save":"(hit enter to save)","ajxp_admin.sites.externals":"External URLs","ajxp_admin.sites.externals.details":"\u003cdiv\u003e\nCells uses its detected public URL in some features. It will try to use the most appropriate value based on your configuration. \u003cbr/\u003e\u003cbr/\u003eFor example:\n\u003cul\u003e\n\u003cli\u003e\u0026bull; If a unique site is defined and it has an external URL, that one is probably correct.\u003c/li\u003e\n\u003cli\u003e\u0026bull; When multiple sites are defined, you may want to force a unique URL that will be used for all external communication.\u003c/li\u003e\n\u003cli\u003e\u0026bull; If no external URL is detected, it will fallback to the internal bind address. In that case, you probably do not want to send a private IP (or 0.0.0.0:port…) to the outside world.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cbr/\u003e\nThe fields below show the detected values. Select to edit or type in a custom value and hit enter to save.\n\u003c/div\u003e","ajxp_admin.sites.links.url":"URL used to build public links","ajxp_admin.sites.mailer.url":"URL used to build links in emails","ajxp_admin.sites.no-defaults":"No defaults set","ajxp_admin.sites.title":"Sites","ajxp_admin.user.1":"+ User","ajxp_admin.user.10":"Access to %i workspaces","ajxp_admin.user.11":"%i roles","ajxp_admin.user.12":"Group path","ajxp_admin.user.
