s modalités particulières de réservation du marchand. Il vous incombe de vous assurer d&#x27;avoir lu les modalités générales du marchand ou les modalités particulières de réservation du marchand en vigueur au moment où vous effectuez votre réservation. Avant d&#x27;effectuer une réservation, il vous incombe de prendre connaissance des modalités générales du marchand et des modalités particulières de réservation en vigueur du marchand en question. Par exemple, les modalités générales du marchand et (ou) les modalités particulières de réservation du marchand peuvent indiquer que : i) certaines réservations sont définitives, non remboursables, non transférables et (ou) non échangeables; ii) si vous n&#x27;arrivez pas à l&#x27;heure, ou ne vous présentez pas du tout à l&#x27;établissement du marchand, ou si vous ne donnez pas de préavis d&#x27;annulation d&#x27;une réservation conformément à la politique d&#x27;annulation du marchand, vous pourriez être soumis à des frais de client défaillant ou d&#x27;annulation tardive qui seront facturés à la méthode de paiement utilisée pour effectuer cette réservation. En effectuant une réservation, vous acceptez toutes les modalités générales du marchand ou les modalités particulières de réservation du marchand qui s&#x27;appliquent à votre réservation. Tock n&#x27;est en aucun cas responsable des frais facturés à votre méthode de paiement en cas de manquement à l&#x27;obligation d&#x27;annuler votre réservation ou de se conformer aux modalités générales du marchand ou aux modalités particulières de réservation du marchand.</li><li class="MuiTypography-root css-ngedz8"><b>3.3. Transférabilité des réservations.</b> Votre réservation peut être transférable. Vous déclarez et garantissez que votre transfert de toute réservation sera conforme aux lois applicables dans votre territoire. Si vous achetez une réservation auprès d&#x27;une entité autre que Tock, vous le faites à vos propres risques. Tock n&#x27;est pas responsable des contrefaçons ou des fausses déclarations. La revente illégale (ou la tentative de revente illégale), la contrefaçon ou la copie d&#x27;une réservation est un motif de saisie et d&#x27;annulation de cette réservation et de toute autre réservation que vous auriez effectuée, sans contrepartie. En outre, Tock se réserve le droit de limiter ou de refuser les privilèges d&#x27;achat de la réservation à toute personne qui, selon Tock, enfreint ou a enfreint les présentes modalités. Comme Tock ne garantit pas l&#x27;authenticité des réservations achetées auprès d&#x27;autres entités qu&#x27;elle-même (y compris mais sans s&#x27;y limiter, auprès de courtiers ou d&#x27;autres utilisateurs de Tock), Tock vous recommande de n&#x27;acheter des réservations que directement auprès d&#x27;elle. Les réservations ne peuvent être utilisées à des fins de publicité, de promotion, de concours ou de loterie sans l&#x27;accord écrit préalable d&#x27;un représentant autorisé de Tock et du marchand concerné.</li></ul><p class="MuiTypography-root css-qy3q74"><b>4. Marchands</b></p><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>4.1. Responsabilités du marchand.</b> Vous reconnaissez et comprenez par la présente que chaque marchand (et non Tock) est seul responsable de tous les aspects de ses affaires et activités, y compris la fourniture de nourriture, de boissons et d&#x27;autres aspects d&#x27;une réservation, du service, de l&#x27;environnement, de la sécurité, de la qualité et de l&#x27;exactitude.</li><li class="MuiTypography-root css-ngedz8"><b>4.2. Conformité du marchand.</b> Vous reconnaissez et comprenez par les présentes que chaque marchand (et non Tock) est entièrement responsable de la commercialisation, de la vente, de l&#x27;établissement des prix, de l&#x27;emballage et de la fourniture de tous les produits, services ou autres réservations offerts aux clients par l&#x27;entremise des services, conformément à toutes les lois applicables. Tock ne fait aucune déclaration et ne donne aucune garantie quant au fait qu&#x27;un marchand détient un permis, une licence, un enregistrement ou une autre accréditation pour son entreprise, que les déclarations d&#x27;un marchand sont vraies et exactes ou qu&#x27;un marchand se conforme aux lois applicables, et Tock n&#x27;est pas responsable de la qualité des produits ou des services fournis par les marchands.</li><li class="MuiTypography-root css-ngedz8"><b>4.3. Exonération de responsabilité.</b> Les marchands sont seuls responsables de tous les dommages, pertes, responsabilités, coûts, réclamations, blessures, demandes, amendes, récompenses et dépenses de toute nature (y compris mais sans s&#x27;y limiter, les frais et honoraires raisonnables d&#x27;avocat) (collectivement, les « pertes ») que vous avez subis à la suite de votre interaction avec un marchand ou de votre visite chez un marchand, ou à la suite d&#x27;une réservation, d&#x27;une promotion, d&#x27;une offre, d&#x27;un produit ou d&#x27;un service d&#x27;un marchand. Vous devez régler toutes les contestations directement auprès du marchand. Dans toute la mesure permise par la loi applicable, vous exonérez par la présente Tock, ses sociétés affiliées et ses dirigeants, administrateurs, employés et agents respectifs (collectivement, les « parties de Tock ») de toutes ces pertes. DANS LE CADRE DE CE QUI PRÉCÈDE, SI VOUS RÉSIDEZ EN CALIFORNIE, VOUS RENONCEZ PAR LA PRÉSENTE À L&#x27;ARTICLE 1542 DU CODE CIVIL CALIFORNIEN, QUI STIPULE CE QUI SUIT : LES EXONÉRATIONS GÉNÉRALES NE S&#x27;ÉTENDENT PAS AUX CRÉANCES QUE LE CRÉANCIER NE CONNAÎT PAS OU DONT IL NE SOUPÇONNE PAS L&#x27;EXISTENCE EN SA FAVEUR AU MOMENT OÙ IL SIGNE L&#x27;EXONÉRATION ET QUI, S&#x27;IL LES AVAIT CONNUES, AURAIENT AFFECTÉ DE MANIÈRE SIGNIFICATIVE SON RÈGLEMENT AVEC LE DÉBITEUR. Par la présente, vous renoncez expressément à tous les droits et avantages en vertu du présent article et de toute loi de tout endroit ayant un effet similaire en ce qui concerne l&#x27;exonération de toute réclamation inconnue ou insoupçonnée que vous pourriez avoir contre les parties de Tock concernant l&#x27;objet du présent article 4.3. Si vous résidez au Royaume-Uni ou dans l&#x27;Union européenne, la présente exonération ne s&#x27;applique pas aux dommages résultant d&#x27;une faute intentionnelle ou d&#x27;une négligence grave de notre part ni aux dommages résultant d&#x27;une atteinte à la vie, à l&#x27;intégrité physique ou à la santé.</li></ul><p class="MuiTypography-root css-qy3q74"><b>5. Réservations payées</b></p><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>5.1. Réservations payées.</b> Si vous souhaitez effectuer une réservation nécessitant le versement d&#x27;une somme d&#x27;argent à un marchand ou nécessitant une carte de débit ou de crédit pour garantir cette réservation (chacune étant une « réservation payée »), Tock ou un tiers chargé du traitement des paiements vous demandera de fournir des renseignements de paiement (« renseignements de paiement »). Vous convenez que tous les renseignements de paiement que vous fournissez à Tock ou à ce tiers sont exacts, actuels et complets. Vous acceptez de régler tous les frais de réservation payée encourus par vous ou par tout utilisateur de votre compte et (ou) de votre carte de crédit (ou de tout autre mécanisme de paiement) aux prix en vigueur au moment de l&#x27;achat ou tels que vous en avez convenu, y compris les frais du marchand, les frais de Tock et les taxes applicables (tels que définis ci-dessous). « Frais du marchand » désigne l&#x27;ensemble des frais de service ou autres frais liés à une réservation payée donnée, qui sont définis et seront perçus par le marchand. « Frais de Tock » désigne tous les frais de service ou autres frais relatifs à une réservation payée donnée qui seront perçus par Tock. Les frais de Tock ne sont pas remboursables. Les frais du marchand et les frais de Tock sont indiqués comme des articles distincts lors de l&#x27;achat. Tock accepte plusieurs méthodes de paiement possibles pour vous permettre d&#x27;effectuer une réservation payée. Vous déclarez et garantissez que vous avez légalement le droit d&#x27;utiliser toute carte de crédit ou tout autre mécanisme de paiement utilisé dans le cadre d&#x27;une réservation payée. En soumettant ces renseignements de paiement, vous accordez à Tock le droit de les fournir à un tiers dans le but de faciliter l&#x27;exécution de votre réservation payée. La vérification des renseignements de paiement peut être exigée avant l&#x27;exécution de toute réservation payée.</li><li class="MuiTypography-root css-ngedz8"><b>5.2. Tock comme agent de recouvrement.</b> Les paiements que vous effectuez auprès d&#x27;un marchand par l&#x27;intermédiaire des services peuvent être soumis à Tock et, dans ce cas, Tock agira en tant qu&#x27;agent de recouvrement de ce marchand dans le seul but d&#x27;accepter et de traiter les paiements que vous effectuez. La remise de votre paiement à Tock (agissant en tant qu&#x27;agent de recouvrement du marchand concerné) satisfait à vos obligations envers le marchand. Une fois le paiement reçu par Tock pour le marchand, ce dernier a autorisé Tock à créditer électroniquement les fonds dans un compte bancaire qu&#x27;il lui a indiqué. Dans l&#x27;éventualité où Tock ne verserait pas ces montants, ce marchand n&#x27;aura de recours que contre Tock et non contre vous directement.</li><li class="MuiTypography-root css-ngedz8"><b>5.3. Facilitateur de marché et taxes.</b> Tock peut être qualifiée de « facilitatrice de marché » dans certains endroits. Une entreprise facilitatrice de marché est généralement définie dans les lois des États fédérés des États-Unis comme une entreprise qui passe des contrats avec des vendeurs tiers pour promouvoir la vente de biens physiques, de biens numériques et (ou) de services détenus et fournis par un tiers par l&#x27;intermédiaire d&#x27;un site Web en ligne. Pour autant que Tock est une facilitatrice de marché, elle est responsable du calcul, de la collecte et du versement des taxes de vente et d&#x27;utilisation. Tock facturera et percevra les taxes de vente et d&#x27;utilisation sur les transactions imposables, et vous serez responsable du paiement de ces taxes de vente et d&#x27;utilisation si elles sont facturées. Tous les frais relatifs aux réservations payées (y compris les frais du marchand et les frais de Tock applicables) ne comprennent pas les taxes nationales, provinciales, d&#x27;État, locales ou autres (« taxes »), sauf indication contraire explicite.</li></ul><p class="MuiTypography-root css-qy3q74"><b>6. Protection des renseignements personnels</b></p><p class="MuiTypography-root css-qy3q74">En utilisant les services, vous confirmez que vous avez lu et compris la<!-- --> <a class="MuiTypography-root MuiLink-root MuiLink-underlineAlways css-1vvozcy MuiTypography-colorPrimary Anchor" href="/privacy">politique de protection des renseignements personnels</a>. Votre accès aux services et votre utilisation de ceux-ci sont régis par la politique sur la protection des renseignements personnels de Tock, laquelle est incorporée par renvoi dans les présentes modalités.</p><p class="MuiTypography-root css-qy3q74"><b>7. Pages des services de tiers et de marchands</b></p><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>7.1. Services de tiers.</b> Les services (y compris les pages des marchands) peuvent être liés ou intégrés à divers sites Web, services ou applications de tiers (collectivement, les « services de tiers ») qui sont susceptibles de mettre leur contenu, leurs produits ou leurs services à votre disposition. Les pages des marchands comprennent souvent des liens vers des services de tiers liés à ce marchand en particulier. Parmi les exemples de services de tiers figurent les articles sur un marchand ou son site Web; et les articles sur l&#x27;industrie du tourisme réceptif, et les entreprises de traitement des paiements. Si vous cliquez sur un lien vers un service tiers, il se peut que vous quittiez les services et que vous alliez au service tiers que vous avez sélectionné. Ces services de tiers peuvent avoir leurs propres modalités et politiques, et l&#x27;utilisation que vous en ferez sera régie par ces modalités et politiques.<!-- --> <b>Nous ne contrôlons pas les services de tiers et n&#x27;en sommes pas responsables. Nous ne sommes pas non plus responsables pour toute transaction que vous pourriez effectuer avec eux ou de ce qu&#x27;ils font.</b></li><li class="MuiTypography-root css-ngedz8"><b>7.2. Contenu.</b> Les services (y compris les pages des marchands) peuvent renfermer du contenu, y compris mais sans s&#x27;y limiter du texte, des photos, des images, de la musique, des sons, des vidéos, des logos et du matériel associé (« contenu ») d&#x27;un marchand (« contenu du marchand ») et (ou) des expériences potentielles des marchands : a) qui sont offensants ou répréhensibles; b) qui comprennent des erreurs; c) dont le téléchargement, la copie ou l&#x27;utilisation sont soumis à des modalités et politiques supplémentaires de tiers ou sont protégés par des lois sur la propriété intellectuelle, le secret commercial, le respect de la vie privée ou d&#x27;autres lois. Tock n&#x27;est pas responsable du contenu ou de l&#x27;expérience des marchands.</li><li class="MuiTypography-root css-ngedz8"><b>7.3. Pas de promotion.</b> Les descriptions ou images de services de tiers ou d&#x27;expériences de marchands, ou les références à ces services ou expériences de marchands à partir des services ne signifient pas que Tock en fait la promotion. Tock ne s&#x27;occupe ni de la prestation ni de la promotion des services de tiers ou de l&#x27;expérience du marchand, et elle n&#x27;en fait pas la garantie. Les marchands sont des tiers; Tock n&#x27;est pas affiliée à un marchand et n&#x27;est pas non plus responsable du contenu du marchand ou de ses expéri des services ou de leur contenu (y compris le contenu du marchand).</li><li class="MuiTypography-root css-ngedz8"><b>8.3. Contenu de l&#x27;utilisateur.</b> Les services peuvent vous permettre de soumettre, de transmettre, d&#x27;afficher ou de fournir d&#x27;une autre manière du contenu, y compris mais sans s&#x27;y limiter, des critiques, des commentaires, des évaluations, des photos, des images, des vidéos, des sons, des textes, des données, des liens et des renseignements de positionnement (« contenu de l&#x27;utilisateur »). Ce contenu de l&#x27;utilisateur ne doit pas : a) être illégal, menaçant, obscène, raciste, diffamatoire, pornographique; enfreindre des droits de propriété intellectuelle; promouvoir des activités illégales ou porter préjudice à des groupes et (ou) des personnes; porter atteinte aux droits d&#x27;un tiers en matière de publicité ou de protection des renseignements personnels; être délibérément faux ou autrement préjudiciable à des tiers, ou être répréhensible; b) contenir ou consister en des logiciels, des virus informatiques, des sollicitations commerciales, des campagnes politiques, des chaînes de lettres, du publipostage, toute forme de « pourriel » ou des références à des activités illégales, à des fautes professionnelles, à des surfacturations intentionnelles, à de la publicité mensongère ou à des violations du code de la santé (par exemple, présence de corps étrangers dans les aliments, intoxication alimentaire, etc.) Votre contenu d&#x27;utilisateur doit être impartial et objectif. Vous ne pouvez pas soumettre d&#x27;avis, de commentaires ou d&#x27;évaluations pour lesquels vous êtes rémunéré de quelque manière que ce soit, ou pour votre propre restaurant ou celui de votre employeur, d&#x27;un ami, d&#x27;un parent ou d&#x27;un concurrent. Vous ne pouvez pas utiliser une fausse adresse de courriel, usurper l&#x27;identité d&#x27;une personne ou d&#x27;une entité, ou tromper quant à l&#x27;origine du contenu de l&#x27;utilisateur. Le d&#x27;autres personnes utiliser votre profil ou mot de passe; iii) fournir une identification fausse ou trompeuse ou des renseignements du même ordre; iv) porter atteinte à la vie privée ou violer les droits personnels ou de propriété de toute personne ou entité; c) utiliser les services d&#x27;une manière qui pourrait empêcher d&#x27;autres clients d&#x27;utiliser les services ou d&#x27;en profiter, ou encore d&#x27;effectuer une réservation. En outre, vous déclarez et garantissez que votre utilisation des services est conforme aux lois applicables, y compris mais sans s&#x27;y limiter, aux contrôles et réglementations applicables en matière d&#x27;exportation ou d&#x27;importation et aux sanctions.</li><li class="MuiTypography-root css-ngedz8"><p class="MuiTypography-root css-qy3q74"><b>8.7 Plaintes liées au droit d&#x27;auteur (Digital Millennium Copyright Act).</b> En exploitant les services, nous pouvons agir comme fournisseur de service, selon la définition donnée dans la Digital Millennium Copyright Act (« DMCA ») pour « Service provider », et offrir des services en tant que fournisseur en ligne de matériel et de liens vers des sites Web de tiers. Il est donc possible que du matériel de tiers ne nous appartenant pas ou que nous ne contrôlons pas soit transmis, conservé, consulté ou rendu disponible d’une autre manière à l’aide des services. Tock a en place certaines procédures exigées par la loi en cas d’allégation de violation de droit d’auteur liée aux services. Si vous croyez que du matériel accessible par l’intermédiaire des services viole un droit d’auteur, vous devez nous en aviser en suivant la procédure d’avis de violation présumée de la DMCA (17 U.S.C. sect. 512(c)(2)). Nous retirerons promptement tout matériel signalé comme une violation ou en désactiverons l’accès, et suivrons la procédure de la DMCA pour régler le différend entre la personne ayant signalé le matériel en question et la personne accusée qui a fourni le matériel. Notre agent désigné (c’est-à-dire la bonne personne à aviser), celui à qui vous devez signaler toute violation soupçonnée de la DMCA, est le conseiller en propriété intellectuelle d’American Express (<a href="mailto:DMCA@aexp.com" target="_blank" class="Anchor" rel="noopener">DMCA@aexp.com</a>).</p><p class="MuiTypography-root css-acoaoq">Le signalement doit comprendre :</p><ul class="MuiTypography-root css-acoaoq"><li class="MuiTypography-root css-ngedz8">1. l’identification de l’œuvre ou autre propriété intellectuelle protégée par droit d’auteur faisant l’objet d’une violation selon vous;</li><li class="MuiTypography-root css-ngedz8">2. l’identification du matériel trouvé dans les services qui représente une violation selon vous, et suffisamment de détails pour que nous puissions le trouver dans les services;</li><li class="MuiTypography-root css-ngedz8">3. une déclaration de votre part que vous croyez de bonne foi que l’utilisation faite n’est pas autorisée par le propriétaire du droit d’auteur, son représentant ou la loi;</li><li class="MuiTypography-root css-ngedz8">4. une déclaration de votre part, sous peine de parjure, que a) les renseignements susmentionnés contenus dans votre signalement sont exacts; et que b) vous êtes propriétaire du matériel protégé par droit d’auteur en question ou êtes autorisé à agir au nom du propriétaire dudit matériel;</li><li class="MuiTypography-root css-ngedz8">5. vos adresse, numéro de téléphone et adresse de courriel;</li><li class="MuiTypography-root css-ngedz8">6. votre signature manuscrite ou électronique.</li></ul><p class="MuiTypography-root css-acoaoq">Nous pouvons informer nos utilisateurs des signalements de violation soupçonnée en publiant un avis général sur les services, en envoyant un courriel à l’adresse de courriel de l’utilisateur figurant dans nos dossiers ou en envoyant une communication par courrier de première classe à l’adresse réelle de l’utilisateur figurant dans nos dossiers. Si vous recevez un tel avis de violation présumée, vous pouvez envoyer à l’agent désigné une notification de contestation par écrit comprenant les renseignements ci-dessous. Pour être valide, la notification de contestation doit être une communication écrite comprenant :</p><ul class="MuiTypography-root css-acoaoq"><li class="MuiTypography-root css-ngedz8">1. votre signature manuscrite ou électronique;</li><li class="MuiTypography-root css-ngedz8">2. l’identification du matériel ayant été retiré ou dont l’accès a été désactivé, et l’endroit où ce matériel se trouvait avant d’être retiré ou avant que l’accès n’en soit désactivé;</li><li class="MuiTypography-root css-ngedz8">3. une déclaration de votre part, sous peine de parjure, que vous croyez de bonne foi que le matériel a été retiré ou que l’accès en a été désactivé en raison d’une erreur ou d’un malentendu concernant ledit matériel;</li><li class="MuiTypography-root css-ngedz8">4. vos nom, adresse réelle et numéro de téléphone, et une déclaration que vous consentez à être soumis à l’autorité du territoire d’une Cour de district fédérale relevant du district judiciaire dans lequel se trouve votre adresse réelle ou, si votre adresse réelle se trouve à l’extérieur des États-Unis, de tout district judiciaire dans lequel nous pouvons nous trouver, et que vous accepterez la signification d’un acte de procédure de la part de la personne ayant soumis l’avis de violation présumée ou d’un représentant de ladite personne.</li></ul><p>La DMCA ne s’applique qu’aux États-Unis.</p></li></ul><p class="MuiTypography-root css-qy3q74"><b>9. Mesures importantes que nous pouvons prendre.</b> Nous nous réservons les droits suivants, que nous pouvons exercer à tout moment et à notre seule discrétion, sans responsabilité ni préavis (sauf si la loi applicable l&#x27;interdit) : a) nous pouvons modifier tout ou partie des services et de leurs fonctionnalités; b) nous pouvons suspendre ou interrompre l&#x27;ensemble ou une partie des services; c) nous pouvons résilier, suspendre, restreindre ou désactiver votre accès ou votre utilisation de l&#x27;ensemble ou d&#x27;une partie des services; d) nous pouvons résilier, suspendre, restreindre ou désactiver l&#x27;accès à vos comptes ou à l&#x27;ensemble ou à une partie de vos réservations; e) nous pouvons honorer tout coupon, code de réduction, code promotionnel ou autres promotions similaires ou imposer des conditions à leur reconnaissance; f) nous pouvons interdire à un compte d&#x27;effectuer une ou plusieurs réservations; g) nous pouvons refuser de permettre à un compte d&#x27;effectuer une réservation en particulier; h) nous pouvons modifier nos critères d&#x27;admissibilité pour l&#x27;utilisation des services (et si ces modifications des critères d&#x27;admissibilité sont interdites par la loi dans votre pays de résidence, nous pouvons révoquer votre droit d&#x27;utiliser les services dans ce territoire).</p><p class="MuiTypography-root css-qy3q74"><b>10. Durée et résiliation.</b> La présente convention restera en vigueur jusqu&#x27;à ce que vous la résiliez ou que nous la résilions; et vous acceptez que Tock ne soit pas responsable envers vous ou un tiers de cette résiliation. Vous pouvez résilier la présente convention à tout moment par l&#x27;intermédiaire des services. Nous nous réservons le droit de modifier, de suspendre ou d&#x27;interrompre, ou d&#x27;arrêter, de restreindre ou de désactiver votre utilisation ou votre accès à l&#x27;ensemble ou à une partie des services ou de leurs fonctionnalités, à tout moment, à notre seule discrétion et sans préavis. Par exemple, nous pouvons suspendre ou mettre fin à votre utilisation d&#x27;une partie ou de la totalité des services si vous enfreignez les présentes modalités. Nous nous efforcerons de vous donner un préavis raisonnable en cas de suspension ou de résiliation d&#x27;une partie ou de la totalité des services. Nous nous réservons également le droit de retirer tout marchand des services à tout moment et à notre seule discrétion. Dans le cas improbable d&#x27;une telle suppression, nous pourrions être amenés à annuler les réservations que vous avez effectuées auprès de ces marchands. Nous vous informerons de ces annulations. Tous les articles de la présente convention qui, du fait de leur nature, doivent survivre à la résiliation, survivent à la résiliation, y compris mais sans s&#x27;y limiter, les articles suivants des présentes modalités et tout article ou toute disposition similaire dans le reste de la présente convention : Réservations, Marchands, Réservations payées, Exonération de responsabilité, Dénis de garantie, Limitation de responsabilité, Indemnisation, Règlement des contestations et Modalités supplémentaires.</p><p class="MuiTypography-root css-qy3q74"><b>11. Dénis de garantie.</b> Dans toute la mesure permise par la loi applicable, Tock ne donne aucune garantie, expresse ou implicite, concernant les services, tout contenu du marchand ou contenu de l&#x27;utilisateur sur ceux-ci ou tout marchand. Les services et l&#x27;ensemble du contenu du marchand ou du contenu de l&#x27;utilisateur qui s&#x27;y trouvent sont fournis « en l&#x27;état » et « selon leur disponibilité ». Tock décline également toute garantie de qualité marchande, d&#x27;adéquation à un usage particulier et d&#x27;absence de contrefaçon. Aucun conseil ni renseignement, qu&#x27;il soit oral ou écrit, que vous auriez obtenu auprès de Tock, ne peut donner lieu à une quelconque garantie. Tock ne fait aucune déclaration et ne donne aucune garantie : a) au sujet de l&#x27;exactitude ou de l&#x27;exhaustivité des services ou de tout contenu du marchand ou contenu de l&#x27;utilisateur qui s&#x27;y trouve; b) que les services ou tout contenu du marchand ou contenu de l&#x27;utilisateur qui s&#x27;y trouvent : i) seront opportuns, ininterrompus ou exempts d&#x27;erreurs; ii) répondront à vos exigences ou à vos attentes; iii) seront exempts de virus ou d&#x27;autres éléments nuisibles.</p><p class="MuiTypography-root css-qy3q74"><b>12. Limitation de responsabilité.</b> Vous reconnaissez et acceptez que, dans toute la mesure permise par la loi applicable, les parties de Tock ne seront en aucun cas responsables des réclamations découlant des services ou de la présente convention, ou s&#x27;y rapportant, pour ce qui suit : a) tout dommage indirect, spécial, accessoire, exemplaire, punitif ou consécutif; b) toute perte de profits, revenus, données, fonds de commerce ou autres pertes intangibles; c) toute perte (telle que définie ci-dessous) liée à votre accès, utilisation ou incapacité d&#x27;accès ou d&#x27;utilisation de l&#x27;intégralité ou d&#x27;une partie de votre compte, de vos réservations ou de l&#x27;intégralité ou d&#x27;une partie des services, y compris mais sans s&#x27;y limiter, l&#x27;interruption de l&#x27;utilisation ou la cessation ou la modification de tout aspect des services; d) toute perte liée à l&#x27;indisponibilité, la dégradation, la perte, la corruption, le vol, l&#x27;accès non autorisé ou la transformation non autorisée de tout contenu, tout renseignement ou toute donnée; e) tout contenu du marchand ou autre conduite ou contenu de tout utilisateur ou tiers utilisant les services, y compris mais sans s&#x27;y limiter, toute conduite ou tout contenu diffamatoire, offensant ou illégal; f) tout service de tiers ou site de tiers accessible par l&#x27;intermédiaire des services. Ces limitations s&#x27;appliquent à toute théorie de responsabilité, qu&#x27;elle soit basée sur la garantie, le contrat, le délit, la négligence, la responsabilité stricte ou toute autre théorie juridique, que Tock ait été informée ou non de la possibilité de tels dommages, et même s&#x27;il s&#x27;avère qu&#x27;un recours énoncé dans la présente convention n&#x27;a pas atteint son objectif essentiel. Dans toute la mesure permise par la loi applicable, la responsabilité globale de Tock au regard de toutes les réclamations découlant des services et de la présente convention ou s&#x27;y rapportant ne peut en aucun cas dépasser le montant le plus élevé entre vingt dollars (20 $) et les montants que vous avez payés à Tock, que ce soit directement ou en agissant en tant qu&#x27;agent de recouvrement au nom d&#x27;un ou de plusieurs marchands, au cours des trois (3) mois précédant immédiatement l&#x27;événement qui a donné lieu à une telle réclamation.</p><p class="MuiTypography-root css-qy3q74"><b>13. Indemnisation.</b> Dans toute la mesure permise par la loi, vous acceptez d&#x27;indemniser et de dégager de toute responsabilité Tock et ses sociétés affiliées, ainsi que leurs administrateurs, dirigeants, employés et agents, contre toutes les pertes découlant de ou liées à : a) votre violation des présentes modalités; b) votre utilisation et votre accès aux services ou à leur contenu; c) votre violation d&#x27;une loi ou d&#x27;un règlement ou des droits ou de la réputation d&#x27;un tiers. Tock a le droit, mais non l&#x27;obligation, de participer à la défense de ces actions avec l&#x27;avocat de son choix. Vos obligations d&#x27;indemnisation en vertu du présent article ne s&#x27;appliquent pas dans la mesure où elles résultent directement de notre violation de la présente convention.</p><p class="MuiTypography-root css-qy3q74"><b>14. Règlement des contestations</b></p><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>14.1. Indemnisation.</b> Avant de déposer une réclamation contre Tock, vous acceptez de tenter de résoudre la contestation en envoyant un avis de votre réclamation à American Express ADR c/o CT Corporation System, 28 Liberty Street, New York, New York 10005. Votre <u>avis de réclamation doit comprendre</u> une description de votre réclamation et une preuve de votre relation avec Tock. Si nous ne parvenons pas à régler la contestation dans les quatre-vingt-dix (90) jours suivant la réception de votre premier avis de réclamation, Tock ou vous pourrez alors entamer une procédure d&#x27;arbitrage.</li><li class="MuiTypography-root css-ngedz8"><b>14.2. Convention d&#x27;arbitrage.</b><br/><br/><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>14.2.1. À moins que vous ne choisissiez de vous retirer pendant la période de retrait conformément à l&#x27;article 14.3, Tock et vous acceptez de résoudre toute réclamation, question ou toute contestation découlant de la convention ou en rapport avec les présentes modalités (y compris mais sans s&#x27;y limiter, son existence, sa formation, son fonctionnement et sa résiliation) et (ou) les services (y compris mais sans s&#x27;y limiter, les contestations et questions non contractuelles) par le biais d&#x27;un arbitrage définitif et contraignant, et Tock et vous renoncez expressément au droit à une procédure judiciaire officielle (y compris mais sans s&#x27;y limiter, à un procès avec jury), à l&#x27;exception des cas prévus dans le présent article. L&#x27;accès à la preuve et les droits de recours dans le cadre de l&#x27;arbitrage sont généralement plus limités que dans le cadre d&#x27;un procès, et d&#x27;autres droits dont vous et nous disposerions devant un tribunal peuvent ne pas exister dans le cadre de l&#x27;arbitrage. L&#x27;arbitrage ne comprend ni juge ni jury, mais seulement une tierce partie expérimentée et indépendante qui agit en tant qu&#x27;arbitre; et la révision judiciaire d&#x27;une sentence arbitrale est limitée.</b></li><li class="MuiTypography-root css-ngedz8"><b>14.2.2.</b> L&#x27;arbitre est habilité à accorder toute mesure d&#x27;indemnisation prévue par la loi ou l&#x27;équité qui pourrait être accordée par un tribunal. L&#x27;arbitre a en outre le droit d&#x27;imposer des sanctions, conformément aux règles de l&#x27;American Arbitration Association (« AAA »), le cas échéant, y compris pour : a) toute réclamation ou soumission frivole dont l&#x27;arbitre estime qu&#x27;elle n&#x27;a pas été déposée de bonne foi; b) le non-respect de l&#x27;article 14 par une partie. Pour éviter toute ambiguïté, le droit d&#x27;imposer des sanctions comprend le droit de transférer les frais d&#x27;arbitrage si les règles de l&#x27;AAA le permettent.</li><li class="MuiTypography-root css-ngedz8"><b>14.2.3.</b> Toute demande d&#x27;arbitrage ou demande reconventionnelle formulée par l&#x27;une ou l&#x27;autre partie doit contenir suffisamment de renseignements pour que l&#x27;autre partie soit dûment informée de l&#x27;identité de la partie requérante, des réclamations formulées et des allégations factuelles sur lesquelles reposent ces réclamations, et doit comporter la preuve que le requérant est partie aux présentes modalités. L&#x27;arbitre peut exiger la modification de toute demande ou demande reconventionnelle qui ne satisfait pas à ces exigences. L&#x27;arbitre a le droit d&#x27;imposer des sanctions pour toute réclamation qu&#x27;il juge frivole ou inadéquate (au titre de la norme énoncée dans la règle fédérale de procédure civile 11 et au titre de toutes normes similaires en vigueur dans d&#x27;autres territoires), y compris pour toute réclamation déposée au nom d&#x27;un demandeur qui n&#x27;est pas partie aux présentes modalités.</li></ul></li><li class="MuiTypography-root css-ngedz8"><b>14.3. Non-participation à l&#x27;arbitrage. Vous pouvez refuser cette convention d&#x27;arbitrage en nous envoyant un avis de refus à l&#x27;adresse American Express, P.O. Box 981556, El Paso, TX 79998 dans un délai de trente (30) jours à compter de la date à laquelle vous avez accepté les présentes modalités (« période de retrait »). Votre avis de refus doit comprendre votre nom complet, votre adresse résidentielle et une déclaration claire indiquant que vous ne souhaitez pas participer à l&#x27;arbitrage. Si vous renoncez à participer à l&#x27;arbitrage au titre de l&#x27;article 14.3, alors les articles 14.2, 14.4, 14.5 et 14.6 des présentes modalités ne s&#x27;appliqueront pas à vous. Cette renonciation n&#x27;a d&#x27;incidence sur aucun autre article des présentes modalités, y compris mais sans s&#x27;y limiter, les articles 14.8 (Délai de dépôt), 14.9 (Pas de recours collectifs) et 15 (Droit applicable; forum judiciaire pour les contestations).</b></li><li class="MuiTypography-root css-ngedz8"><b>14.4. Délai de dépôt pour l&#x27;arbitrage.</b> Tout arbitrage doit débuter par la présentation d&#x27;une demande d&#x27;arbitrage dans un délai d&#x27;un (1) an à compter de la date à laquelle la partie faisant valoir la réclamation a eu connaissance ou devrait raisonnablement avoir eu connaissance de l&#x27;acte, de l&#x27;omission ou du manquement à l&#x27;origine de la réclamation. Si la loi applicable interdit un délai de prescription d&#x27;un (1) an pour faire valoir des réclamations, toute réclamation doit être faite dans le délai le plus court autorisé par la loi applicable.</li><li class="MuiTypography-root css-ngedz8"><b>14.5. Procédures d&#x27;arbitrage.</b> L&#x27;arbitrage sera géré par l&#x27;American Arbitration Association (« AAA ») (numéro sans frais : 1 800 778-7879, site Web :<!-- --> <a class="MuiTypography-root MuiLink-root MuiLink-underlineAlways css-1vvozcy MuiTypography-colorPrimary Anchor" href="https://www.adr.org/" target="_blank" rel="noopener">www.adr.org</a>) et réglé devant un arbitre unique. Si l&#x27;AAA ne peut pas effectuer l&#x27;arbitrage, Tock et vous conviendrez mutuellement d&#x27;un autre fournisseur d&#x27;arbitrage. Sous réserve des modifications apportées par le présent article 14, l&#x27;AAA administrera l&#x27;arbitrage conformément à ses règles et procédures de règlement des contestations en vigueur au moment du dépôt de la demande d&#x27;arbitrage (les « règles de l&#x27;AAA »), à l&#x27;exclusion de toute règle ou procédure régissant ou autorisant les actions collectives ou représentatives. Chaque partie est responsable de ses propres honoraires d&#x27;avocat, sauf dans la mesure où les règles de l&#x27;AAA, l&#x27;arbitre et (ou) la loi applicable en disposent autrement. Un jugement sur la décision rendue par cet arbitre peut être rendu par tout tribunal compétent. Le terme « arbitre », tel qu&#x27;il est utilisé à l&#x27;article 14, s&#x27;entend comme incluant l&#x27;AAA. Tock et vous pouvez convenir que : a) les présentes modalités ont une incidence sur le commerce entre les États fédérés, de sorte que la US Federal Arbitration Act et les lois fédérales sur l&#x27;arbitrage s&#x27;appliquent et régissent l&#x27;interprétation et l&#x27;application du présent article 14 (malgré l&#x27;article 15 ci-dessous); b) toute audience d&#x27;arbitrage se déroule à New York (État de New York) dans un lieu dont il faut convenir, est administrée par l&#x27;AAA en anglais et est réglée par un (1) arbitre commercial possédant une expérience considérable dans le règlement de contestations concernant la propriété intellectuelle et les contrats commerciaux, qui sera sélectionné à partir de la liste appropriée des arbitres de l&#x27;AAA, conformément aux règles de cette dernière.<br/><br/><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>14.5.1. Pas d&#x27;arbitrages collectifs ou joints sans consentement écrit.</b> Sauf dans la mesure où elle y consent à sa seule discrétion par écrit, Tock n&#x27;accepte ni ne consent en aucune circonstance à un arbitrage collectif, à un arbitrage général par un mandataire ou à un arbitrage impliquant des réclamations conjointes.</li><li class="MuiTypography-root css-ngedz8"><b>14.5.2. Divisibilité des réclamations.</b> Si une décision judiciaire définitive empêche l&#x27;application des limitations du présent article 14 à une réclamation, un recours ou une demande de mesure d&#x27;indemnisation particulière, cette réclamation, ce recours ou cette mesure d&#x27;indemnisation (et uniquement cette réclamation, ce recours ou cette mesure d&#x27;indemnisation) doit être dissocié de l&#x27;arbitrage et peut faire l&#x27;objet d&#x27;une demande devant un tribunal. Les parties conviennent toutefois que toute décision relative à des réclamations, recours ou mesures d&#x27;indemnisation non soumises à l&#x27;arbitrage sera suspendue dans l&#x27;attente de l&#x27;issue des réclamations et recours arbitraux. Le présent article 14.5.2 ne vous empêche ni vous ni Tock de participer à un règlement collectif des réclamations.</li></ul></li><p class="MuiTypography-root css-acoaoq"><b>14.6. Frais d&#x27;arbitrage.</b> Les règles de l&#x27;AAA régissent le paiement de tous les frais d&#x27;arbitrage. Nous ne demanderons pas les honoraires et frais de nos avocats dans le cadre de l&#x27;arbitrage, à moins que l&#x27;arbitre ne détermine que votre réclamation est frivole. Tock et vous convenez que l&#x27;AAA dispose du pouvoir discrétionnaire, si elle l&#x27;estime approprié, de réduire le montant ou de modifier le moment de paiement des frais administratifs ou d&#x27;arbitrage dus en vertu de ses règles applicables, à condition que cette modification n&#x27;augmente pas les coûts pour vous. Vous acceptez en outre de renoncer à toute objection à une telle modification des frais. Tock et vous convenez également qu&#x27;une contestation de bonne foi par l&#x27;une ou l&#x27;autre partie des frais imposés par l&#x27;AAA ne constitue pas un manquement, une renonciation ou une violation du présent article 14 tant que cette contestation reste en suspens auprès d&#x27;un arbitre et (ou) d&#x27;un tribunal compétent, et que toutes les dates d&#x27;exigibilité de ces frais sont suspendues pendant la durée de cette contestation.</p><p class="MuiTypography-root css-acoaoq"><b>14.7. Exceptions à la convention d&#x27;arbitrage.</b> Nonobstant toute disposition des présentes modalités, Tock ou vous pouvez intenter une action en justice uniquement pour obtenir une injonction visant à mettre fin à l&#x27;utilisation non autorisée ou à l&#x27;abus des services, ou à la violation ou à l&#x27;appropriation illicite de la propriété intellectuelle (par exemple, des marques de commerce, des secrets commerciaux, des droits d&#x27;auteur ou des droits de brevet) sans avoir recours à l&#x27;arbitrage ou à la procédure informelle de règlement des contestations décrite plus haut. Tock ou vous pouvez faire valoir vos droits, s&#x27;ils sont recevables, devant la Cour des petites créances de New York (État de New York) ou de tout autre comté américain où vous résidez ou travaillez.</p><p class="MuiTypography-root css-acoaoq"><b>14.8. Délai de dépôt.</b> Toute réclamation non soumise à l&#x27;arbitrage doit être introduite dans un délai d&#x27;un (1) an à compter de la date à laquelle la partie faisant valoir la réclamation a eu connaissance ou devrait raisonnablement avoir eu connaissance de l&#x27;acte, de l&#x27;omission ou du manquement à l&#x27;origine de la réclamation. Si la loi applicable interdit un délai de prescription d&#x27;un (1) an pour faire valoir des réclamations, toute réclamation doit être faite dans le délai le plus court autorisé par la loi applicable.</p><p class="MuiTypography-root css-acoaoq"><b>14.9. PAS DE RECOURS COLLECTIFS.</b> Vous ne pouvez régler les contestations auprès de nous qu&#x27;à titre individuel. Vous ne pouvez pas introduire une réclamation en tant que plaignant ou membre d&#x27;un recours collectif, dans le cadre d&#x27;un recours collectif, joint ou représentatif. Les recours collectifs, les arbitrages collectifs, les actions collectives, les actions générales de mandataire et le regroupement avec d&#x27;autres arbitrages ne sont pas autorisés, sauf dans la mesure où Tock, à sa seule discrétion, y consent par écrit conformément à l&#x27;article 14.5.1.</p></ul><p class="MuiTypography-root css-qy3q74"><b>15. Droit applicable; forum judiciaire pour les contestations.</b> Les présentes modalités (y compris leur existence, leur formation, leur fonctionnement et leur résiliation) et les services, ainsi que toutes les contestations et questions découlant des présentes modalités et des services ou s&#x27;y rapportant (y compris les contestations et questions non contractuelles) sont régis à tous égards par les lois de l&#x27;État de New York, sans tenir compte des dispositions relatives au conflit de lois, à l&#x27;exception de la FAA qui prévaut en cas de conflit entre les lois de l&#x27;État de New York et elle en ce qui concerne l&#x27;article 14. S&#x27;il s&#x27;avère que l&#x27;article 14 ne s&#x27;applique pas à vous ou à votre réclamation, ou si vous renoncez à l&#x27;arbitrage dans le cadre de l&#x27;article 14.3, Tock et vous convenez que toute procédure judiciaire (autre que les poursuites pour de petites créances) découlant des présentes modalités (y compris leur existence, leur formation, leur fonctionnement et leur résiliation) et (ou) des services (y compris les litiges et questions non contractuels) doit être engagée exclusivement devant les tribunaux fédéraux ou d&#x27;État du comté de New York (État de New York). Tock et vous acceptez la compétence personnelle de ces tribunaux et le lieu où ils se trouvent.</p><p class="MuiTypography-root css-qy3q74"><b>16. Modalités supplémentaires</b></p><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>16.1. Nos applications mobiles.</b> Vous reconnaissez que les présentes modalités constituent un contrat juridique contraignant entre Tock et vous uniquement, et non avec une société de boutiques d&#x27;applications mobiles telle qu&#x27;Apple Inc. ou Google LLC, et que Tock, et non une telle société de boutiques d&#x27;applications, est seule responsable des services, de leur contenu et de leur support.</li><li class="MuiTypography-root css-ngedz8"><b>16.2. Communications électroniques.</b> Tock communiquera avec vous par des moyens électroniques, y compris mais sans s&#x27;y limiter, par courriel, message texte ou notification poussée. Vous acceptez par la présente que tous les avis, divulgations, conventions et autres communications que nous vous fournissons par voie électronique satisfassent à toute exigence légale selon laquelle ces communications doivent être effectuées par écrit.</li><li class="MuiTypography-root css-ngedz8"><b>16.3. Intégralité de la convention.</b> Les présentes modalités constituent l&#x27;intégralité de la convention entre Tock et vous concernant l&#x27;objet des présentes modalités, et elles annulent et remplacent toute autre convention antérieure ou actuelle, ou toutes les autres modalités applicables à l&#x27;objet des présentes. Vous reconnaissez ne vous être appuyé sur aucun terme ni aucune modalité, déclaration, garantie ou représentation, à l&#x27;exception de ceux qui sont expressément énoncés dans les présentes modalités. Vous reconnaissez aussi n&#x27;avoir aucun recours concernant tout terme, toute modalité, déclaration, garantie ou représentation. Vous pouvez également être soumis à des modalités, politiques ou conventions supplémentaires qui peuvent s&#x27;appliquer lorsque vous utilisez d&#x27;autres services, y compris des services de tiers. Les présentes modalités ne créent aucun droit de tiers, et aucun tiers n&#x27;a le droit ou la capacité de revendiquer un droit de propriété ou d&#x27;intenter une action pour faire appliquer les présentes modalités (sauf si cela est expressément envisagé dans les présentes ou s&#x27;il en est convenu autrement dans des modalités supplémentaires entre vous et une société affiliée de Tock qui énoncent les droits de tiers de cette affiliée de Tock pour faire appliquer les présentes modalités).</li><li class="MuiTypography-root css-ngedz8"><b>16.4. Renonciation, divisibilité et cession.</b> Le fait que nous n&#x27;appliquions pas une disposition des présentes modalités ou que nous tardions à le faire ne constitue pas une renonciation à notre droit de le faire ultérieurement. Si une disposition des présentes modalités est jugée inapplicable, les autres dispositions restent pleinement en vigueur et sont remplacées par une disposition applicable reflétant le plus fidèlement possible notre intention. Vous ne pouvez pas déléguer, transférer ou céder les présentes modalités ou l&#x27;un de vos droits ou obligations en vertu des présentes sans notre consentement écrit préalable; toute tentative de ce type sera sans effet. Nous pouvons déléguer, transférer ou céder les présentes modalités ou l&#x27;ensemble ou une partie de nos droits et obligations en vertu des présentes, à notre seule discrétion, à l&#x27;une de nos sociétés affiliées ou filiales ou à tout acquéreur de l&#x27;une de nos activités ou de l&#x27;un de nos actifs associés aux services, moyennant un préavis écrit de trente (30) jours.</li><li class="MuiTypography-root css-ngedz8"><b>16.5. Modifications.</b> Nous pourrons modifier les présentes modalités de temps à autre et nous publierons la version la plus récente sur notre site. Si une modification réduit sensiblement vos droits, nous vous en informerons (par exemple, en vous envoyant un courriel ou en affichant un avis bien visible dans les services). L&#x27;avis indiquera une période raisonnable après laquelle les nouvelles modalités prendront effet. Les modifications ne s&#x27;appliqueront pas rétroactivement. En continuant à utiliser les services ou à y accéder après l&#x27;entrée en vigueur de toute modification, vous acceptez d&#x27;être lié par la convention modifiée et les changements de prix. Si vous n&#x27;êtes pas d&#x27;accord avec nos modifications, vous devez cesser d&#x27;utiliser les services et annuler toutes les réservations.</li><li class="MuiTypography-root css-ngedz8"><b>16.6. Événements indépendants de notre volonté.</b> Nous n&#x27;enfreignons pas les présentes modalités et ne sommes pas responsables envers vous en cas de défaillance totale ou partielle des services résultant d&#x27;un acte, d&#x27;une circonstance, d&#x27;un événement ou d&#x27;une question échappant à notre contrôle raisonnable. Cela peut comprendre des situations faisant suite à un cas de force majeure; un incendie; une mesure gouvernementale ou d&#x27;un État, ou une réglementation; une guerre; des mouvements populaires; des actes de terrorisme; une pandémie; une insurrection; une incapacité à communiquer avec des tiers pour quelque raison que ce soit; une défaillance de tout système informatique ou nécessaire; une défaillance ou un retard dans la transmission des communications; une défaillance de tout fournisseur de services Internet; une grève; une action industrielle ou un lock-out; ou toute autre raison échappant à notre contrôle raisonnable.</li><li class="MuiTypography-root css-ngedz8"><b>16.7. Traduction.</b> Les présentes modalités ont été rédigées à l&#x27;origine en anglais. Nous pourrons les traduire dans d&#x27;autres langues. En cas de conflit entre une version traduite et la version anglaise, la version anglaise prévaut, sauf si la loi applicable l&#x27;interdit.</li></ul><p class="MuiTypography-root css-qy3q74"><b>17. Conditions pour messages SMS</b></p><ul class="MuiTypography-root css-qy3q74"><li class="MuiTypography-root css-ngedz8"><b>17.1</b> En fournissant votre numéro de téléphone mobile, vous acceptez les<!-- --> <a class="MuiTypography-root MuiLink-root MuiLink-underlineAlways css-1vvozcy MuiTypography-colorPrimary Anchor" href="/terms">Conditions d’utilisation</a> et la<!-- --> <a class="MuiTypography-root MuiLink-root MuiLink-underlineAlways css-1vvozcy MuiTypography-colorPrimary Anchor" href="/privacy">Politique de Confidentialité</a>, et votre numéro de téléphone mobile pourrait être utilisé pour vous envoyer des messages texte, vous appeler à l’aide d’un système de composition automatique et vous envoyer des messages vocaux et des messages texte artificiels ou préenregistrés pour confirmer et gérer des réservations.</li><li class="MuiTypography-root css-ngedz8"><b>17.2</b> Vous pouvez vous désabonner des messages SMS à tout moment. Répondez « STOP » à tout moment pour vous désabonner des messages SMS. Une fois que vous aurez envoyé le message SMS « STOP », un message SMS vous sera envoyé pour confirmer votre désabonnement. Après quoi, vous ne recevrez plus de messages SMS de notre part. Pour vous réabonner, répondez « START » et nous recommencerons à vous envoyer des messages SMS.</li><li class="MuiTypography-root css-ngedz8"><b>17.3</b> Si vous éprouvez des problèmes concernant le programme de messages, vous pouvez<!-- --> <a href="https://www.surveymonkey.com/r/VQGTSY5" target="_blank" class="Anchor" rel="noopener">obtenir de l’aide ici.</a></li><li class="MuiTypography-root css-ngedz8"><b>17.4</b> Les fournisseurs de services mobiles et Tock ne sont pas responsables des messages reçus en retard ou non transmis.</li><li class="MuiTypography-root css-ngedz8"><b>17.5</b> Comme toujours, des frais pour messages et données peuvent s’appliquer pour tout message que nous vous envoyons et que vous nous envoyez. La fréquence d’envoi de messages varie. Pour toute question concernant votre forfait de messages texte ou de données, communiquez avec votre fournisseur de services mobiles.</li><li class="MuiTypography-root css-ngedz8"><b>17.6</b> Si vous avez des questions concernant la confidentialité, veuillez lire notre <a class="MuiTypography-root MuiLink-root MuiLink-underlineAlways css-1vvozcy MuiTypography-colorPrimary Anchor" href="/privacy">Politique de Confidentialité</a>.</li></ul></div></div></main><footer class="jss4"><div class="jss15"><div class="jss16"><style data-emotion="css f15ysr">.css-f15ysr{width:88px;color:var(--color-fg-contrast);}</style><style data-emotion="css cxyboh">.css-cxyboh{display:block;fill:currentColor;height:auto;width:100%;width:88px;color:var(--color-fg-contrast);}</style><svg width="86" height="24" viewBox="0 0 86 24" xmlns="http://www.w3.org/2000/svg" class="css-cxyboh"><path d="M12.04 18.84C8.2388 18.84 5.16 15.7714 5.16 11.9829C5.16 8.79428 7.3616 6.10285 10.32 5.34857V0.119995C4.4892 0.942852 0 5.94857 0 12C0 18.6343 5.4008 24 12.04 24C14.7404 24 17.2344 23.1086 19.2468 21.6171L15.531
