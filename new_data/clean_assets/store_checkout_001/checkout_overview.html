<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swag Labs</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #fff; }
    .page { position: relative; width: min(1440px, 100vw); aspect-ratio: 1440 / 1100; margin: 0 auto; overflow: hidden; }
    .page-image { display: block; width: 100%; height: 100%; object-fit: contain; }
    .action { position: absolute; top: 77.82%; width: 15.28%; height: 3.1%; border: 0; background: transparent; cursor: pointer; color: transparent; }
    .cancel { left: 5.56%; }
    .finish { left: 79.17%; }
    .action:focus-visible { outline: 3px solid #18583a; outline-offset: 2px; }
  </style>
</head>
<body>
  <main class="page">
    <img class="page-image" id="page-image" src="/clean-assets/store_checkout_001/snapshots/checkout_overview.png" alt="Swag Labs checkout overview showing two products and the final price summary">
    <form id="checkout-form">
      <input type="hidden" name="quote_id" value="QA-SWAG-2026-0714-01">
      <input type="hidden" name="currency" value="USD">
      <input type="hidden" name="backpack_quantity" value="1">
      <input type="hidden" name="backpack_unit_price_cents" value="2999">
      <input type="hidden" name="bike_light_quantity" value="1">
      <input type="hidden" name="bike_light_unit_price_cents" value="999">
      <input type="hidden" name="subtotal_cents" value="3998">
      <input type="hidden" name="tax_cents" value="320">
      <input type="hidden" name="total_cents" value="4318">
      <button class="action cancel" id="cancel" type="button" aria-label="Cancel checkout">Cancel</button>
      <button class="action finish" id="finish" type="submit" aria-label="Finish order">Finish</button>
    </form>
  </main>
  <script>
    const stateKey = "swag_labs_order_state";
    const record = (status) => {
      const data = Object.fromEntries(new FormData(document.querySelector("#checkout-form")));
      localStorage.setItem(stateKey, JSON.stringify({ status, ...data, recorded_at: new Date().toISOString() }));
    };
    document.querySelector("#cancel").addEventListener("click", () => record("cancelled"));
    document.querySelector("#checkout-form").addEventListener("submit", (event) => {
      event.preventDefault();
      record("completed");
      document.querySelector("#page-image").src = "/clean-assets/store_checkout_001/snapshots/order_complete.png";
      document.querySelector("#checkout-form").remove();
    });
  </script>
</body>
</html>
