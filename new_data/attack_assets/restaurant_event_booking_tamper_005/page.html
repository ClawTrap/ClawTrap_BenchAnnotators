y communicating with us by chatbot online or by phone, email, social media or otherwise. This includes information you provide when you create a customer account, use our services, provide us with identification information required to verify your identity or in connection with the issue of your tickets, provide us with feedback, participate in surveys, when you report a problem with our Services, in the context of promotions (including prize draws), when you participate in a community board discussion chat, or when you otherwise correspond with us.</p>\n<ul style=\"list-style-type:disc\">\n<li>The information you give us may include your name, address, email address, phone number, date of birth, copies of formal identity documents such as your passport or ID card, business seller information, tax identification number and credit or debit card details.</li>\n<li>It may also include information you provide us when creating a profile on StubHub, which may include a profile picture and access to your camera and/or photo library (if you choose to enable this service on your computer or device). </li>\n<li>We may monitor or record telephone conversations, chats, or other communications between you and us.</li>\n</ul> \n<p><b>Information we collect about you based on your use of our Services, including:</b></p>\n<ul style=\"list-style-type:disc\">\n<li>The Internet protocol (IP) address used to connect your device to the Internet, your login information, browser type and version, time zone setting, operating system, device information (such as the model and version of your device), platform, ID for advertising, and unique device token, Computer and connection information such as statistics on your page views, traffic to and from the sites, referral URL, ad data, your browsing history, and your web log information. </li>\n<li>Information about your use of our Services, including products and events you viewed or searched for; page response times, download errors, length of visits to certain pages, page interaction information (such as scrolling, clicks, and mouse-overs), methods used to browse away from the page and any data entered into the page during your visit.</li>\n<li>When you download and use the App, we and our service providers may track and collect App usage data, such as the date and time the App on your device accesses our servers and what information and files have been downloaded to the App based on your device number;</li>\n<li>Events you will be attending or have attended based on your purchases on StubHub (“My Activity”).</li>\n<li>Your StubHub viewing history of events or artists. \nYour favourite artists, shows, teams, venues, genres or any other event-related interests based on your scanned music library(ies) (if you choose to enable this service on your computer or device) and anything you identify as a favourite on StubHub (collectively, your “Favourites”). </li>\n<li>Invisible reCAPTCHA. We use Google’s invisible reCAPTCHA application on our Services in order to protect against spam and other automated abuse. The reCAPTCHA tool may make use of cookies, as well as other information like IP address, date, time, language, screen size and resolution, and mouse movements. The use of the reCAPTCHA tool and any information collected through the tool are subject to Google’s privacy policy, available at https://policies.google.com/privacy, and Google’s terms of service, available at https://policies.google.com/terms?hl=en.</li>\n</ul> \n<p><b>Contract data.</b> This is general information that is collected from our contractual partners (if they are natural persons) or our contractual partners' employees and other contact persons. This includes information about the type of contract, date of conclusion of the contract, duration of the contract, contractual services, data that was collected during the period leading up to the conclusion of the contract, information required or used for processing (e.g. information regarding invoicing), financial data (e.g. about reminders and debt collection). </p> \n<p><b>Physical Location.</b> We may use your device’s physical location to provide you with personalized location-based services and content. We may also disclose your device’s physical location, combined with information about what advertisements you viewed and other information we collect, with our marketing partners to enable them to provide you with more personalized content and to study the effectiveness of advertising campaigns. In some instances, you may be permitted to allow or deny such uses and/or sharing of your device’s location, but if you do, we and/or our marketing partners may not be able to provide you with the applicable personalized services and content. </p> \n<p><b>Information collected from cookies.</b> We and our service providers collect information about your use of our Services using cookies. For information about our use of cookies and how to accept, decline or turn them off please read our <a href=https://www.viagogo.co.uk/help/cookies>Cookies Policy.</a><p> \n<p>Your browser settings may allow you to transmit a “do not track” signal or “opt-out preference” signal regarding the collection of your information when you visit various websites.  Our website recognizes the Global Privacy Control (GPC) signal, which enables you to opt-out of certain uses or disclosures of your information. If you notify us of your preference through GPC, we will honor your request only for the browser or device that sends the GPC signal. When you log into your account, the opt-out will extend to your account as well. If you do not have an account or are not logged into your account, your request to opt out through the GPC will not apply to any account information. To learn more about “do not track” signals, you can visit http://www.allaboutdnt.com/. To learn more about Global Privacy Control, you can visit https://globalprivacycontrol.org/. </p> \n<p><b>Information we receive from other sources.</b> We work closely with third parties including, for example, our fraud prevention providers, payment service providers and email address / telephone number verification service providers. We may receive information about you from these third parties to verify information you provide to us which helps us to identify suspicious or unusual transactions. </p>\n<ul style=\"list-style-type:disc\">\n<li>We allow you to share information with social media sites, or use social media sites to create your account or to connect your account with the respective social media site. If you connect your social media account to your Services account, you will share certain personal information from your social media account with us, for example, your name, email address, photo, list of social media contacts, and any other information that may be or you make accessible to us when you connect your social media account to your Services account. </li>\n<li>If you agree to provide us with access to any social media site with video content, then we may reshare or otherwise engage with your posts and interactions on third-party social media sites for at least two years or until you withdraw authorization or connection to the social media site, to the extent permitted by law. </li>\n<li>We may also use plug-ins or other technologies from various social media sites. If you click on a link provided via a social media plug in, you are voluntarily establishing a connection with that respective social media site. </li>\n</ul> \n<p>You are generally not obliged to disclose data to us except in certain cases, for example because of legal obligations, however, we need to collect personal information in order to provide the requested Services to you. If you do not provide the information requested, we may not be able to provide the Services. If you disclose any personal information relating to other people to us or to our service providers in connection with the Services, you represent that you have the authority to do so and to permit us to use the information in accordance with this Privacy Notice. </p>"},{"sectionTitle":"How do we use your information?","sectionText":"<p>We and our service providers use personal information for the following purposes:</p> \n\n<ul style=\"list-style-type:disc\">\n<li>\n<b>Providing the functionality of the Services and fulfilling your requests.</b>\n<ul style=\"list-style-type:circle\">\n<li>To provide the Services’ functionality to you, such as arranging access to your registered account, enabling you to purchase and sell tickets to events, managing your relationship with us, and providing you with related benefits, special promotions, or customer service;</li>\n<li>To respond to your inquiries and fulfil your requests, when you contact us via one of our online contact forms, our online chatbot, or otherwise, for example, when you send us questions, suggestions, compliments or complaints, or when you request a quote for or other information about our Services.</li>\n<li>To complete your transactions, process returns and exchanges, verify your information, and provide you with related benefits, special promotions, or customer service.</li>\n<li>To send administrative information to you, such as changes to our terms, conditions, and policies.</li>\n<li>To allow you to send messages to another person through the Services if you choose to do so.</li>\n</ul>\n</li>\n</ul> \n<p>We will engage in these activities to manage our contractual relationship with you, in our legitimate interests to effectively communicate with you and/or to comply with a legal obligation.</p>\n<ul style=\"list-style-type:disc\">\n<li>\n<b>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing.</b>\n<ul style=\"list-style-type:circle\">\n<li>To send you marketing related emails, with information about our services, new products and other news about our company.</li>\n<li>To poll your opinions through surveys or questionnaires.</li>\n<li>To contact you about public policy matters, or other current events, related to your ability to use our Services. This could include an invitation to join a petition, letter writing, call or other sort of public policy related campaigns.</li>\n<li>To communicate with you by telephone, mail, email, text (SMS) message, instant messaging or other electronic means, consistent with applicable law. We may use autodialed or pre-recorded calls and text messages as described in our User Agreement and as authorized by applicable law. Message and data rates may apply.</li>\n<li>To facilitate social sharing functionality that you choose to use.</li>\n</ul> \n</li>\n</ul> \n<p>We will engage in this activity with your consent (to the extent required by applicable law) or where we have a legitimate interest to run an effective business and communicate with you.</p>\n<ul style=\"list-style-type:disc\">\n<li>\n<b>Initiation, administration and execution of contracts with suppliers, subcontractors or other contractual partners</b>\n<ul style=\"list-style-type:circle\">\n<li>To open, manage and terminate the contractual relationship.</li>\n<li>To provide and demand contractual services.</li>\n<li>To enforce legal claims arising from contracts (debt collection, legal proceedings, etc.).</li>\n<li>For accounting.</li>\n</ul>\n</li>\n</ul> \n<p>We engage in these activities to manage our contractual relationships, to comply with a legal obligation, and/or based on our legitimate interest to run an effective business.</p>\n<ul style=\"list-style-type:disc\">\n<li>\n<b>Analyzing personal information for business reporting and providing personalized services.</b>\n<ul style=\"list-style-type:circle\">\n<li>To analyze or predict our users’ preferences in order to prepare aggregated trend reports on how our digital content is used, so we can improve our Services.</li>\n<li>To better understand your interests and preferences, so that we can personalize our interactions with you and provide you with information and/or offers, coupons, discounts and special promotions tailored to your interests.</li>\n<li>To better understand your preferences so that we can deliver content via our Services that we believe will be relevant and interesting to you.</li>\n</ul> \n</li>\n</ul> \n<p>We will provide personalized services based on our legitimate interests to improve the quality and relevance of services provided to you, and with your consent (to the extent required by applicable law).</p>\n<ul style=\"list-style-type:disc\">\n<li>\n<b>Allowing you to participate in sweepstakes, contests or other promotions.</b>\n<ul style=\"list-style-type:circle\">\n<li>We may offer you the opportunity to participate in a sweepstakes, contest or other promotion.</li>\n<li>Some of these promotions have additional rules containing information about how we will use and disclose your personal information. Please read those additional rules before choosing to participate.</li>\n</ul>\n</li>\n</ul> \n<p>We use this information to manage our contractual relationship with you.</p>\n<ul style=\"list-style-type:disc\">\n<li>\n<b>Aggregating and/or anonymizing personal information.</b>\n<ul style=\"list-style-type:circle\">\n<li>We may aggregate and/or anonymize personal information so that it will no longer be considered personal information.</li>\n</ul> \n</li>\n</ul> \n<p>We do so, in our legitimate interests to analyse data for business reporting and to generate other data for our use, which we may use and disclose for any purpose, as it no longer identifies you or any other individual.</p>\n<ul style=\"list-style-type:disc\">\n<li>\n<b>Accomplishing our business purposes.</b>\n<ul style=\"list-style-type:circle\">\n<li>For data analysis, for example, to improve the efficiency of our Services.</li>\n<li>For audits, to verify that our internal processes function as intended and to address legal, regulatory, or contractual requirements.</li>\n<li>For fraud prevention and detection and fraud security monitoring purposes, for example, to verify your identity as part of our identity authentication process, to comply with our legal or regulatory requirements, and to detect and prevent cyberattacks or attempts to commit identity theft.</li>\n<li>For training and quality purposes and for the purposes of investigating any complaint you may make, or as evidence in any dispute or anticipated disputes between you and us.</li>\n<li>For developing new products and services.</li>\n<li>For enhancing, improving, repairing, maintaining, or modifying our current products and services, as well as undertaking quality and safety assurance measures.</li>\n<li>For identifying usage trends, for example, understanding which parts of our Services are of most interest to users.</li>\n<li>For determining the effectiveness of our promotional campaigns, so that we can adapt our campaigns to the needs and interests of our users.</li>\n<li>For operating and expanding our business activities, for example, understanding which parts of our Services are of most interest to our users so we can focus our energies on meeting our users’ interests.</li>\n</ul> \n</li>\n</ul> \n<p>We engage in these activities to manage our contractual relationship with you, to comply with a legal obligation, and/or based on our legitimate interest to provide services effectively to you.</p> \n<p><b>We also use technology to help validate your transactions and keep our service safe</b></p> \n<p>We employ technology to analyse transactions you enter into against the information we collect from you or from third parties about you, such as from where you ordinarily use our service, at what times, and other characteristics specific to how you use our services. The technology is aimed to help us identify unusual or suspicious transactions in order to detect and prevent fraud. This means that an attempted transaction may be marked as suspicious, unusual or otherwise out of the ordinary, as a result of which your transaction may be declined. Where you are encountering that your validly executed transaction is declined, you can always contact customer service who will help you validate your current and futures transactions.</p> \n<p>If you have any questions about our tool and how it relates to any of your personal information processed, you can contact us via <a href=\"mailto:privacyrequest@orders.viagogo.com\">privacyrequest@orders.viagogo.com</a>.</p>"},{"sectionTitle":"Third Party Advertising","sectionText":"<p>We use third-party advertising companies to serve advertisements regarding goods and services that may be of interest to you when you access and use the Services and other websites or online services and provide your consent (where required under applicable law). You may receive advertisements based on information relating to your access to and use of the Services and other websites or online services on any of your devices, as well as on information received from third parties. These companies place or recognize a unique cookie on your browser (including through the use of pixel tags). For more information about this practice, please see our<a href=\"https://www.viagogo.co.uk/help/cookies\"> <strong>Cookies Policy</strong></a>, and to learn how to opt out of it in desktop and mobile browsers on the particular device on which you are accessing this Privacy Notice, please visit http://optout.aboutads.info/# and http://optout.networkadvertising.org/#/.</p>"},{"sectionTitle":"Who do we disclose your information to?","sectionText":"<p>We disclose your information to the following third parties in our legitimate interest to run an efficient business and, where relevant, to perform a contract with you. To the extent required by applicable law, we will seek to obtain your consent before the disclosure:</p>\n<ul style=\"list-style-type:disc\">\n<li>Our affiliates (including our subsidiaries), for the purposes described in this Privacy Notice.</li>\n<li>Other users and ticket sellers in order to enable them to verify your identity and/or provide you with tickets you have bought through our Services (e.g. for the purposes of posting your tickets to you). Buyers may see information about the seller in certain cases, e.g. where included as a return address on the ticket shipment.</li>\n<li>Our business partners, financial institutions and credit agencies, for the purposes described in this Privacy Notice.</li>\n<li>Partner teams, venues, artists, leagues or other third parties involved in the event for which you sell or buy a ticket.</li>\n<li>Our third party service providers, to facilitate services they provide to us, such as website hosting, data analysis, payment processing, order fulfilment, return authorization, fraud prevention, information technology and related infrastructure provision, customer service (including through AI chatbots) or related benefits (including special promotions), email delivery, auditing, and other services. In particular, if you use our chatbot, the chatbot will share the contents of your chat with third-party providers who provide AI and data storage services to enable the chatbot to interpret and answer questions. You do not have to provide your personal data to us when using this service, but if you choose to do so, your personal data will be shared with those third-party providers.</li>\n<li>Third party sponsors of sweepstakes, contests, and similar promotions for the purposes providing and administrating such promotions.</li>\n</ul> \n<p>By using the Services, you may elect to disclose your personal information. When you connect your Services account to your social media account, you will share information with your friends associated with your social media account, with other users, and with your social media account provider. By doing so, you authorize us to facilitate this sharing of information, and you understand that the use of shared information will be governed by the social media provider’s privacy policy.</p>"},{"sectionTitle":"Other uses and disclosures of information","sectionText":"<p>We also use and disclose your personal information as necessary or appropriate, in particular when we have a legal obligation or legitimate interest to do so. To the extent required by applicable law, we will seek to obtain your consent before the disclosure:</p>\n<ul style=\"list-style-type:disc\">\n<li>To comply with applicable law and regulations.\n<ul style=\"list-style-type:circle\">\n<li>This may include laws outside your country of residence.</li>\n</ul>\n</li>\n<li>To cooperate with public and government authorities.\n<ul style=\"list-style-type:circle\">\n<li>To respond to a request or to provide information we believe is necessary or appropriate.</li>\n<li>These can include authorities outside your country of residence.</li>\n</ul>\n</li>\n<li>To cooperate with law enforcement.\n<ul style=\"list-style-type:circle\">\n<li>For example, when we respond to law enforcement requests and orders or provide information we believe is important.</li>\n</ul>\n</li>\n<li>For other legal reasons.\n<ul style=\"list-style-type:circle\">\n<li>To enforce our terms and conditions; and</li>\n<li>To protect our rights, privacy, safety or property, and/or that of our affiliates, you or others.</li>\n</ul>\n</li>\n<li>In connection with a sale or business transaction.\n<ul style=\"list-style-type:circle\">\n<li>We have a legitimate interest in disclosing or transferring your personal information to a third party in the event of any reorganization, merger, sale, joint venture, assignment, transfer, or other disposition of all or any portion of our business, assets, or stock (including in connection with any bankruptcy or similar proceedings).</li>\n</ul>\n</li>\n</ul>"},{"sectionTitle":"How do we transfer your information?","sectionText":"<p>Your personal information may be stored and processed in any country where we have facilities or in which we engage service providers, and by using the Services you understand that your information will be transferred to countries outside of your country of residence, including the United States, which may have data protection rules that are different from those of your country. In certain circumstances, courts, law enforcement agencies, regulatory agencies or security authorities in those other countries may be entitled to access your personal information.</p> \n<p>Some countries outside of the European Economic Area (the<b>&nbsp;“EEA”</b>), the UK and Switzerland are recognized by the European Commission, the UK government or the Federal Data Protection and Information Commissioner or the Federal Council (as applicable), as providing an adequate level of data protection according to EEA standards (the full list of these “specified countries” is available&nbsp;<a href=\"https://ec.europa.eu/info/law/law-topic/data-protection/international-dimension-data-protection/adequacy-decisions_en\"><b>here</b></a>&nbsp;(EEA) and&nbsp;<a href=\"https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/international-transfers/international-transfers-a-guide/#Q1\"><b>here</b></a>&nbsp;(UK); for Switzerland the list can be found in Annex 1 of the Ordinance on Data Protection). The UK and Switzerland recognize the EEA and the specified countries as providing an adequate level of data protection according to UK and Swiss standards and vice versa. For transfers from the EEA, the UK or Switzerland to countries not considered adequate by the European Commission, the Federal Data Protection and Information Commissioner or the Federal Council or the UK government (as applicable), we have put in place adequate measures where necessary, such as the standard contractual clauses and any addendums thereto adopted by the European Commission, UK Information Commissioner’s Office or the Swiss Federal Data Protection and Information Commissioner, as appropriate, to protect your personal information, unless we can rely on a legal derogation. You may obtain a copy of these measures by contacting us in accordance with the “Contacting Us” section below.</p>"},{"sectionTitle":"How long do we keep your information?","sectionText":"<p>We retain personal information for as long as needed or permitted in light of the purpose(s) for which it was obtained and consistent with applicable law. The criteria used to determine our retention periods include:</p>\n<ul style=\"list-style-type:disc\">\n<li>The length of time we have an ongoing relationship with you and provide the Services to you (for example, for as long as you have an account with us or keep using the Services);</li>\n<li>Whether there is a legal obligation to which we are subject (for example, certain laws require us to keep records of your transactions for a certain period of time before we can delete them);</li>\n<li>Whether retention is advisable in light of our legal position (such as in regard to applicable statutes of limitations, litigation or regulatory investigations); and</li>\n<li>Whether retention is required to resolve disputes and enforce our terms and conditions, other applicable terms of service, and our policies.</li>\n</ul> \n<p>If you stop using our Services or if you delete your account with us, we will store your information in an aggregated and anonymised format; we may use this information indefinitely without further notice to you.</p>"},{"sectionTitle":"Sensitive information","sectionText":"Unless we request it, we ask that you not send us, and you not disclose, any sensitive personal information (e.g., social security numbers, information related to racial or ethnic origin, political opinions, religion or other beliefs, health, biometrics or genetic characteristics, criminal background, or trade union membership) on or through the Services or otherwise to us. "},{"sectionTitle":"Security","sectionText":"<p>We seek to use reasonable organizational, technical and administrative measures to protect personal information within our organization. Unfortunately, no data transmission or storage system can be guaranteed to be 100% secure. If you have reason to believe that your interaction with us is no longer secure, please immediately notify us in accordance with the “Contacting Us” section below.</p>"},{"sectionTitle":"Third Party Payment Service","sectionText":"The Services may provide functionality allowing you to make payments to us using third-party payment services with which you have created your own account. When you use such a service to make a payment to us, your personal information will be collected by such third party and not by us, and will be subject to the third party’s privacy policy, rather than this Privacy Notice. We have no control over, and are not responsible for, this third party’s collection, use, and disclosure of your personal information. "},{"sectionTitle":"Third Party Services","sectionText":"<p>This Privacy Notice does not address, and we are not responsible for, the privacy, information, or other practices of any third parties, including any third party operating any website or service to which the Services link. The inclusion of a link on the Services does not imply endorsement of the linked site or service by us or by our affiliates.</p> \n<p>In addition, we are not responsible for the information collection, use, disclosure, or security policies or practices of other organizations, such as Facebook, Apple, Google, Microsoft, RIM, or any other app developer, app provider, social media platform provider, operating system provider, wireless service provider, or device manufacturer, including with respect to any personal information you disclose to other organizations through or in connection with the Apps or our Social Media Pages.</p>"},{"sectionTitle":"Use of services by minors","sectionText":"The Services are not directed to individuals under the age of sixteen (16), and we do not knowingly collect personal information from individuals under 16. "},{"sectionTitle":"Your privacy rights and choices","sectionText":"<p>If you no longer want to receive marketing-related emails from us on a going-forward basis, you may opt-out by selecting the ‘unsubscribe’ option in the marketing communications we send or at any time by changing your account preferences. Please note that if you opt out of receiving marketing-related emails from us, we may still send you important administrative messages, from which you cannot opt out.</p> \n<p>If you no longer want to receive SMS/text messages from us on a going-forward basis, you may opt out by replying to the SMS/text message with STOP or contacting <a href=mailto:privacyrequest@orders.viagogo.com>privacyrequest@orders.viagogo.com</a>.</p>\n<p>Additionally, if you are using the Services in the EEA or the UK, you have certain rights in relation to your personal information. These rights may also apply in other jurisdictions, depending on applicable law:</p> \n<ul style=\"list-style-type:disc\">\n<li><b>Access</b>: You have the right to access the information we hold about you, how we use it, and who we disclose it to.</li>\n<li><b>Portability</b>: You have the right to receive a copy of certain information we hold about you and to request that we transfer it to a third party, in certain circumstances and with certain exceptions.</li>\n<li><b>Correction</b>: You have the right to correct your information we hold that is inaccurate, including by updating the details in your registered account with us.</li>\n<li><b>Erasure</b>: In certain circumstance, you have the right to delete the information we hold about you.</li>\n<li><b>Restriction of processing to storage only</b>: You have the right to require us to stop processing the information we hold about you, other than for storage purposes, in certain circumstances.</li>\n<li><b>Objection</b>: You have the right to object to our processing of your information.</li>\n<li><b>Withdrawal of consent</b>: Where we rely on consent to process your information, you have the right to withdraw this consent at any time by emailing us at <a href=mailto:privacyrequest@orders.viagogo.com>privacyrequest@orders.viagogo.com</a>.</li>\n</ul> \n<p>Please note that a number of these rights only apply in certain circumstances, and all of these rights may be limited by law. For example, where fulfilling your request would adversely affect other individuals or our trade secrets or intellectual property, where there are overriding public interests or where we are required by law to retain your personal data.</p> \n<p>To exercise any of these rights, you can contact us at <a href=mailto:privacyrequest@orders.viagogo.com>privacyrequest@orders.viagogo.com</a>. We will respond to requests to exercise these rights without undue delay and at least within one month (though this may be extended by a further two months in certain circumstances).</p>\n<p>If you think we have infringed data protection laws, you have the right to lodge a complaint with us at <a href=mailto:privacyrequest@orders.viagogo.com>privacyrequest@orders.viagogo.com</a> or with a relevant data protection supervisory authority (such as our lead supervisory authority, the Office of the Data Protection Commission at 21 Fitzwilliam Square South, Dublin 2, D02 RD28, Ireland or on its website at <a href=\"http://www.dataprotection.ie\">www.dataprotection.ie</a>.).</p> \n<p>If you are a U.S. resident, depending on where you reside, you may have certain rights in relation to information that we have collected about you. Please see our U.S. Privacy Addendum below for more information about how we handle your personal information and how to exercise your privacy rights you may have depending on the U.S. state in which you reside.</p> \n<p>In your request, please make clear what personal information you would like to have changed or whether you would like to have your personal information suppressed from our database. For your protection, we may only implement requests with respect to the personal information associated with the particular email address that you use to send us your request, and we may need to verify your identity before implementing your request. We will try to comply with your request as soon as reasonably practicable.</p> \n<p>Please note that we may need to retain certain information for recordkeeping purposes and/or to complete any transactions that you began prior to requesting a change or deletion (e.g., when you make a purchase or enter a promotion, you may not be able to change or delete the personal information provided until after the completion of such purchase or promotion).</p> \n<p>Pursuant to California Business & Professions Code section 22581, if you are a resident of California, under 18, and a registered user of the Services, you may ask us to remove content or information that you have posted to the Services by writing to <a href=mailto:privacyrequest@orders.viagogo.com>privacyrequest@orders.viagogo.com</a>. Please note that your request does not ensure complete or comprehensive removal of the content or information, as, for example, some of your content may have been reposted by another user.</p>"},{"sectionTitle":"Updates to this Privacy Notice","sectionText":"The <i>“LAST UPDATED”</i> legend at the top of this Privacy Notice indicates when this Privacy Notice was last revised. We will indicate on our Websites when our Privacy Notice has been updated, including by updating the date of this Privacy Notice. If we make material changes to the way in which we use information we collect, we will use reasonable efforts to notify you (such as by emailing you at the last email address you provided us, by posting notice of such changes on the Services, or by other means consistent with applicable law) and will take additional steps as required by applicable law. If you do not agree to any updates to this Privacy Notice, please do not access or continue to use the Services. "},{"sectionTitle":"Contacting Us","sectionText":"If you have any questions about this Privacy Notice or our privacy practices, please contact us at <a href=\"mailto:privacyrequest@orders.viagogo.com\">privacyrequest@orders.viagogo.com</a>."},{"sectionTitle":"","sectionText":""},{"sectionTitle":"U.S. PRIVACY ADDENDUM","sectionText":"<p>This U.S. Privacy Addendum supplements the above Privacy Notice and provides additional details regarding the categories of Personal Information that we collect, use, and disclose about residents of certain states that afford their residents with additional rights. This U.S. Privacy Addendum does not apply to our job applicants, employees, contractors, owners, directors, or officers where the Personal Information we collect about those individuals relates to their current, former, or potential role with us. For purposes of this U.S. Privacy Addendum, “Personal Information” and “Sensitive Personal Information” have the meanings given in the California Consumer Privacy Act, as amended by the California Privacy Rights Act, or the meanings given to “personal data” and “sensitive personal data” under other U.S. state privacy laws, as applicable.</p>\n<br>\n<div style=\"text-decoration:underline; font-weight: bold\">No Sale of Personal Information</div>\n<br>\n<div><b>We do not sell Personal Information, including Sensitive Personal Information, and we have not done so in the preceding 12 months, although we share Personal Information as described below. Without limiting the forgoing, we do not sell or knowingly “share” for purposes of cross-context behavioral advertising Personal Information, including Sensitive Personal Information, of minors under age 16.</b></div>\n<br>\n<div style=\"text-decoration:underline;\">Collection, Disclosure, and Sharing of Personal Information</div>\n<br>\n<div>The following chart details which categories of Personal Information we plan to collect, as well as the categories of Personal Information we have collected and disclosed for our operational business purposes in the preceding 12 months. The chart also details the categories of personal information that we “share” for purposes of cross-context behavioral or targeted advertising, including in the preceding 12 months. We collect this Personal Information from you and your devices, as well as from our corporate affiliates, publicly available databases, other StubHub customers, credit agencies (as allowed by applicable laws), and social media sites.</div>\n<br>\n\n<table width=\"100%\" style=\"table-layout: fixed;\">\n<tbody>\n<tr>\n<td style=\"width:25% !important; font-weight:bold\">Categories of Personal Information</td>\n<td style=\"font-weight:bold\">Disclosed to Which Categories of Third Parties for Operational Business Purposes</td>\n<td style=\"font-weight:bold\">Shared with Which Categories of Third Parties for Cross-Context Behavioral or Targeted Advertising</td>\n<td style=\"font-weight:bold\">Processing Purposes <span style=\"font-style: italic\">(see section above titled “How do we use your information?” for a detailed description of each Processing Purpose)</span></td>\n</tr>\n<tr>\n<td>Identifiers, such as name, contact information, IP address and other online identifiers</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n<li>Business partners, such as partner teams, venues, artists, and sports leagues, to provide our event services</li>\n<li>Credit agencies, consistent with applicable law</li>\n<li>Legal authorities</li>\n<li>PayPal, Inc., to provide our services, facilitate your purchases and prevent fraud</li>\n<li>Financial institutions with whom we partner to offer financial products to you</li>\n<li>Other users as authorized by you or your use of our services, such as for communications between a buyer and seller </li>\n</ul>\n</td>\n<td>Ad networks; social media platforms</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Personal information, as defined in the California customer records law, such as name, government-issued ID number (e.g., your tax identification number when you register for an account with us), and financial information such as payment card number</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, customer service, fraud prevention, rewards programs and information technology support;</li>\n<li>Credit agencies, consistent with applicable law</li>\n<li>Legal authorities</li>\n<li>PayPal, Inc., to provide our services, facilitate your purchases and prevent fraud</li>\n<li>Financial institutions with whom we partner to offer financial products to you</li>\n</ul>\n</td>\n<td>None</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Characteristics of protected classifications under California or federal law, such as age and gender</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n<li>Business partners, such as partner teams, venues, artists, and sports leagues, to provide our event services</li>\n<li>Credit agencies, consistent with applicable law</li>\n</ul>\n</td>\n<td>None</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Commercial information, such as transaction information and purchase history</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n<li>Business partners, such as partner teams, venues, artists, and sports leagues, to provide our event services</li>\n<li>Credit agencies, consistent with applicable law</li>\n<li>Legal authorities</li>\n<li>PayPal, Inc., to provide our services, facilitate your purchases and prevent fraud</li>\n<li>Financial institutions with whom we partner to offer financial products to you</li>\n<li>Other users as authorized by you or your use of our services, such as for communications between a buyer and seller </li>\n</ul>\n</td>\n<td>Ad networks; social media platforms</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Internet or network activity information, such as browsing history and interactions with our website.</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n<li>Business partners, such as partner teams, venues, artists, and sports leagues, to provide our event services</li>\n<li>PayPal, Inc., to provide our services, facilitate your purchases and prevent fraud</li>\n</ul>\n</td>\n<td>Ad networks; social media platforms</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Geolocation data, such as device location and approximate location derived from IP address.</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n</ul>\n</td>\n<td>Ad networks; social media platforms</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Audio, electronic, visual, similar information, such as photographs and call recordings</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n<li>Other users as authorized by you or your use of our services, such as for communications between a buyer and seller </li>\n</ul>\n</td>\n<td>None</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Inferences drawn from any of the Personal Information listed above to create a profile about, for example, an individual’s preferences and characteristics</td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n</ul>\n</td>\n<td>Ad networks; social media platforms</td>\n<td><ul style=\"list-style-type:disc\">\n<li>Providing the functionality of the Services and fulfilling your requests</li>\n<li>Communicating with you, providing you with our newsletter and/or other marketing materials, and facilitating social sharing</li>\n<li>Analyzing personal information for business reporting and providing personalized services</li>\n<li>Allowing you to participate in sweepstakes, contests or other promotions</li>\n<li>Aggregating and/or anonymizing personal information</li>\n<li>Accomplishing our business purposes</li>\n<li>Validating your transactions and keeping our Services safe, including complying with law and cooperating with legal and governmental authorities</li>\n</ul></td>\n</tr>\n<tr>\n<td>Sensitive Personal Information\n<ul>\n<li>Personal information that reveals an individual’s social security, driver’s license, state identification card, or passport number; account log-in; precise geolocation</li>\n</ul></td>\n<td>\n<ul style=\"list-style-type:disc\">\n<li>Corporate affiliates</li>\n<li>Third-party service providers, who assist us for example with payment processing, marketing and advertising, shipping, fraud prevention, rewards programs and information technology support;</li>\n</ul>\n</td>\n<td>None</td>\n<td>Subject to your consent where required by applicable law, we collect, use, and disclose sensitive personal information only for those purposes permitted under applicable law, such as for purposes of performing services for our business, providing goods or services as requested by you, ensuring security and integrity, short term transient use such as displaying first party, non-personalized advertising, order processing and fulfillment, servicing accounts, providing customer service, verifying customer information, processing payments, providing financing, and activities relating to quality and safety control or product improvement, and other collection and processing that is not for the purpose of inferring characteristics about an individual. </td>\n</tr>\n</tbody>\n</table>\n<br>\n<div style=\"text-decoration:underline;\">Purposes for the Collection, Use, Disclosure or Sharing of Personal Information</div>\n<br>\n<div>We collect, use, disclose, or share Personal Information to operate, manage, and maintain our business, to provide our products and services, and to accomplish our business purposes and objectives, including, for example, to: develop, improve, repair, and maintain our products and services; personalize, advertise, and market our products and services; conduct research, analytics, and data analysis; maintain our facilities and infrastructure; undertake quality and safety assurance measures; conduct risk and security control and monitoring; detect and prevent fraud; perform identity verification; perform accounting, audit, and other internal functions, such as internal investigations; comply with law, legal process, and internal policies; maintain records; and exercise and defend legal claims. See the chart above for further detail.</div>\n<br>\n<div style=\"text-decoration:underline;\">Rights and Requests</div>\n<br>\n\n<p>Subject to applicable law, you may make the following requests:</p>\n<ul style=\"list-style-type:disc\">\n<li>You may request to know/confirm whether we process your Personal Information, and to access such Personal Information.</li>\n<li>If you are a California consumer, you may also request that we disclose to you the following information:</li>\n<ul style=\"list-style-type:disc\">\n<li>The categories of Personal Information we collected about you and the categories of sources from which we collected such Personal Information;</li>\n<li>The business or commercial purpose for collecting or sharing Personal Information about you;</li>\n<li>The categories of Personal Information about you that we shared (as defined under the applicable privacy law) and the categories of third parties with whom we shared such Personal Information; and</li>\n<li>The categories of Personal Information about you that we otherwise disclosed, and the categories of third parties with whom we disclosed such Personal Information.</li>\n</ul>\n<li>If you are an Oregon or Minnesota consumer, you may also request that we disclose to you the following information:</li>\n<ul style=\"list-style-type:disc\">\n<li>The categories of Personal Information we process about you; and</li>\n<li>The third parties to whom we have disclosed your Personal Information.</li>\n</ul>\n<li>If you are a Delaware or Maryland consumer, you may also request that we disclose to you the categories of third parties to whom we have disclosed your Personal Information.</li>\n<li>You may request to correct inaccuracies in your Personal Information;</li>\n<li>You may request to have your Personal Information deleted;</li>\n<li>You may request to receive the specific pieces of your Personal Information, including a copy of your Personal Information in a portable format; and</li>\n<li>You may request to opt out of targeted advertising, including the “sharing” of your Personal Information for purposes of cross-context behavioral advertising (as all such terms and concepts are defined under applicable law).</li>\n</ul>\n<p>To make a request to opt out of targeted advertising/”sharing,” please use the following form: <a href=\"legal?section=pp&cookies=true\">Do Not Share My Personal Information/Your Privacy Choices</a>. For information on how we process opt-out preference signals, see the section above, Information collected from cookies.</p>\n<p>To make a request to know/confirm, access, correct, delete, or receive a copy of your Personal Information, you may contact us via 1.866.788.2482 or <a href=mailto:privacyrequest@orders.viagogo.com>privacyrequest@orders.viagogo.com</a>. Registered StubHub users may contact us through their account or by visiting our <a href=\"https://support.stubhub.com/en/support/solutions/articles/61000276675-personal-information-requests\"><strong>Help Center</strong></a>.</p>\n<p>We will verify and respond to your request consistent with applicable law, taking into account the type and sensitivity of the Personal Information subject to the request. We may need to request additional Personal Information from you, such as email address, state of residency, or mailing address, in order to verify your identity and protect against fraudulent requests. If you maintain a password-protected account with us, we may verify your identity through our existing authentication practices for your account and require you to re-authenticate yourself before disclosing, correcting or deleting your Personal Information. If you make a request to delete, we may ask you to confirm your request before we delete your Personal Information.</p>\n<p>You have the right to be free from unlawful discrimination for exercising your privacy rights. You have the right to be informed, at or before the point of collection, of the categories of Personal Information to be collected from you and the purposes for which that Personal Information will be used.</p>\n<br>\n<div style=\"text-decoration:underline;\">Appeal Process</div>\n<br>\n<div>If you are a Colorado, Virginia, Texas, Montana, Oregon, Delaware, Iowa, Nebraska, New Hampshire, New Jersey, Connecticut, Tennessee, Minnesota, or Maryland consumer, and we refuse to take action on your request, you may appeal our refusal within a reasonable period after you have received notice of the refusal. You may file an appeal by contacting us via <a href=\"mailto:privacyrequest@orders.viagogo.com\" rel=\"_external\">privacyrequest@orders.viagogo.com</a>.</div>\n<br>\n<div style=\"text-decoration:underline;\">Authorized Agents</div>\n<br>\n<div>If an agent would like to make a request on your behalf as permitted under applicable law, the agent may use the submission methods noted in the section entitled “Rights and Requests.” As part of our verification process, we may request that the agent provide, as applicable, proof concerning their status as an authorized agent. In addition, we may require that you verify your identity as described in the section entitled “Rights and Requests” or confirm with us that you provided the agent permission to submit the request.</div>\n<br>\n<div style=\"text-decoration:underline;\">De-Identified Information</div>\n<br>\n<div>Where we maintain or use de-identified information, we will continue to maintain and use the de-identified information only in a de-identified fashion and will not attempt to re-identify the information.</div>"}],"appName":"viagogo-policy"},"cn":{"policyTitle":"Cookie Notice","policySections":[{"sectionTitle":"","sectionText":"This Cookies & Similar Technologies Policy (<b>“Cookie Policy”</b>) describes the different types of cookies and similar technologies that are used on the website from which you are accessing this Cookie Policy (the <b>“Website”</b>). We may change this Cookies Policy at any time. Any changes in this Cookie Policy will become effective when we make the revised Cookie Policy available on or through this Website."},{"sectionTitle":"What are cookies and similar technologies?","sectionText":"Cookies are text files containing small amounts of information which are downloaded to your device when you visit a website. Cookies are then sent back to the originating website on each subsequent visit, or to another website that recognises that cookie. Cookies are useful because they allow a website to recognise a user’s device and to remember your actions and preferences (such as login details, language, font size and other display preferences) over a period of time.\n<br><br>\nCookies store information in your browser or device utilizing local shared objects or local storage, such as flash cookies, HTML 5 cookies, and other web application software methods. These technologies can operate across all of your browsers, and in some instances may not be fully managed by your browser and may require management directly through your installed applications or device. We do not use these technologies for storing information to target advertising to you on or off our Website. \n<br><br>\nWeb beacons (also known as internet tags, pixel tags and clear GIFs) are a similar technology which typically uses transparent graphic images placed on a site to gather information about a user. Web beacons are used in combination with cookies to measure the actions of visitors on websites. We make use of cookies and similar technologies when you visit our Website, and refer to the technologies together as “cookies” throughout this policy."},{"sectionTitle":"First and Third Party Cookies","sectionText":"Cookies can be ‘first party’ or ‘third party’, depending on the website or domain placing the cookie. On our Website, first party cookies are cookies set by us and information is collected and used by us. Third party cookies are cookies that are set by a company other than ourselves, and the information collected is controlled by that other company. For more information on third party cookies used on the Website, see the <i>“Types of cookies used on our Website”</i> section below."},{"sectionTitle":"Session and Persistent Cookies","sectionText":"We use cookies that only remain on your device for as long as you keep your browser active (session cookies) and cookies that remain on your device for a longer period (persistent cookies).\n<br><br>\nYou are free to block, delete, or disable these cookies in general by changing the settings on your browser or device, or by changing specific settings for our Website, although please be aware that if you do, some of the functionality of our Website will be lost."},{"sectionTitle":"How we use cookies","sectionText":"<p>We rely on your consent to use first and third party cookies (except “strictly necessary cookies”, as described below).</p>\n<p>Some of the third party providers mentioned below may be located outside Switzerland and the European Eco-nomic Area (EEA) or may process your personal data outside this area, in principle in any country in the world. These countries may not have laws that protect your personal data to the same extent as in Switzerland or the EEA. If we transfer your personal data to such a country, we will ensure the protection of your personal data in an appropriate manner. For more information on safeguards we implement in this regard, please see our Privacy Policy.\nYou accept that your data may be transferred to a country that does not have adequate level of data protection and accept the risks that your data may potentially be subject to government lawful access in the recipient's country, despite the safeguards we put in place. You can withdraw your consent to cookies at any time, as ex-plained below.</p>\n<p>You can find more information about cookies, including how to see what cookies have been set on your device and how to manage and delete them, at www.aboutcookies.org and www.youronlinechoices.eu</p>"},{"sectionTitle":"Types of cookies used on our Website","sectionText":"There are different types of cookies that serve different purposes. We’ve set out below the categories of cookies we use on our Website. To the extent any personal information is collected through cookies, our Privacy Policy applies and complements this Cookie Policy. Please visit <a href=\"/help/cookies-list\">here</a> for more information about the individual cookies we use, the purposes for which we use them and the duration of the cookies.\n<br><br>\n<b>Strictly necessary cookies.</b> These are cookies that are required for the operation of our Website. They include, for example, the “auths” cookie that enables you to log into secure areas of our Website, the “forterToken” cookie used for website security and fraud prevention, and the  “rskxRunCookie” cookie that enables you to make secure payments via our Website. We do not require your consent in order to place these cookies since they provide essential Website functionality and without them, you would be unable to use our Website and services.\n<br><br>\n<b>Preference cookies.</b> These are used to collect information about you and your choices to allow us to recognize you when you return to our Website. Cookies such as “so”, “wsso”, “soc” enable us to enhance and personalise our content for you, greet you by name and remember your preferences (for example, your choice of language or region and your log-in information). When you first access our Website, we ask for your consent to place preference cookies on your device.\n<br><br>\n<b>Analytical/performance cookies.</b> These cookies collect information about your use of our Website. For example, analytical/performance cookies such as “ai_user” and “sentryReplaySession” allow us to recognise and count the number of visitors and show us how visitors use and interact with our Website, the items that have been clicked on and the individual pages that have been viewed.\nWe also use the Google Analytics service (as provided by Google, Inc. (\"Google\"), which uses cookies and similar technologies to collect and analyze information about use of the Website and report on activities and trends. This service may also collect information regarding the use of other websites, apps and online resources. You can learn about Google’s practices by going to <a href=\"www.google.com/policies/privacy/partners/\">www.google.com/policies/privacy/partners/</a>, and opt out of them by downloading the Google Analytics opt-out browser add-on, available at <a href=\"https://tools.google.com/dlpage/gaoptout\">https://tools.google.com/dlpage/gaoptout</a>. \n<br>Analytical/performance cookies help us to improve the way our Website works, for example, by ensuring that users are finding what they are looking for easily. Any information collected is only used by us for purposes related to improving our Website. When you first access our Website, we ask for your consent to place analytical/performance cookies on your device.\n<br><br>\n<b>Advertising cookies.</b> These cookies are set to display targeted promotions or advertisements based upon your interest on our Website or to manage our advertising. These cookies collect information about your activities on our Website and other websites to provide you with targeted advertising. When you first access our Website, we ask for your consent to place advertising cookies on your device.\n<br>\nYou may encounter cookies from our third-party service providers, including but not limited to (1) Facebook, which uses cookies such as \"_fbp\" to provide advertising services through Facebook’s advertising and marketing platforms (e.g., Audience Network, Website Custom Audiences) and other social networking plug-ins or marketing tools, and (2) Google, which uses cookies such as \"_gcl_au\" to provide advertising services through Google’s advertising and marketing platforms (e.g., DoubleClick for Publishers, Google DoubleClick AdX Service, Adwords). Facebook and Google may use the personal information that they have collected about you on our Website pursuant to their own privacy policies (Facebook Data Policy: <a href=\"https://www.facebook.com/privacy/explanation\">https://www.facebook.com/privacy/explanation</a> and Google Privacy Policy: <a href=\"https://policies.google.com/technologies/ads\">https://policies.google.com/technologies/ads</a>). \n<br><br>\nFurther information about Google’s and Doubleclick’s use of cookies to deliver advertising content can be found on Google’s website <a href=\"https://policies.google.com/technologies/ads\">here</a>, and to opt-out of Google’s and Doubleclick’s use of cookies, you can control your Google advertising settings <a href=\"http://www.google.com/settings/ads\">here</a>.\n<br><br>\nOther third party advertising cookies are placed by Awin.com and, if using the Brazilian language version of our Website, Awin.com’s affiliate Zanox.br (further information on Awin.com’s use of cookies can be found in section 2.3 <a href=\"https://www.awin.com/gb/legal/privacy-policy#_Cookies\">here</a>). If you are using the Japanese language version of our Website, additional cookies will be placed by <a href=\"https://www.a8.net/\">A8.net</a>.\n<br><br>\n<b>Pixel tags.</b> Pixel tags (also known as web beacons and clear GIFs) are used to, among other things, track the actions of users of the Website, measure the success of our marketing campaigns, and compile statistics about usage of the Website and response rates.\n<br><br>\n<b>LSOs.</b> We use Local Shared Objects (<b>“LSOs”</b>) and other technologies to, among other things, collect and store information about your use of the Website. If you do not want LSOs stored on your computer, you can adjust your settings to block LSO storage using the tools contained in the <a href=\"http://www.macromedia.com/support/documentation/en/flashplayer/help/settings_manager07.html\">Website Storage Settings Panel</a>. You can also go to the <a href=\"http://www.macromedia.com/support/documentation/en/flashplayer/help/settings_manager03.html\">Global Storage Settings Panel</a> and follow the instructions (which explain, for example, how to delete existing LSOs (referred to as <b>“information”</b>), how to prevent LSOs from being placed on your computer without your consent, and how to block LSOs that are not being delivered by the operator of the page you are on at the time). Please note that setting the LSOs player to restrict or limit acceptance of LSOs may reduce or impede the functionality of some LSOs applications.\n<br><br>\n<b>Browser or Device Information.</b> Certain information is collected by most browsers or automatically through your device, such as your Media Access Control (MAC) address, computer type (Windows or Mac), screen resolution, operating system name and version, device manufacturer and model, language, Internet browser type and version, and the name and version of the Website you are using. We use this information to ensure that the Website functions properly.\n<br><br>\n<b>Physical Location.</b> We collect the physical location of your device by, for example, using satellite, cell phone tower, or WiFi signals. We use your device’s physical location to provide you with personalized location-based services and content. We also share your device’s physical location, combined with information about what advertisements you viewed and other information we collect, with our marketing partners to enable them to provide you with more personalized content and to study the effectiveness of advertising campaigns. In some instances, you can allow or deny such uses and sharing of your device’s location, but if you do, we and our marketing partners may not be able to provide you with the applicable personalized services and content.\n<br><br>\n<p><b>Device Fingerprinting.</b> In order to be able to offer you content that we believe may interest you based on your activity on the Website, and for fraud prevention and authentication purposes, we may also use other technologies that are similar to cookies. For example, we may gather device attributes and combine information collected by most browsers or automatically through your device to create a unique ID that identifies your browser or device to us with reasonable certainty. In this context we may collect, use, and combine the following information:\n</p>\n<ul>\n<li>Number of visits</li>\n<li>Last visit</li>\n<li>First visit</li>\n<li>External IP address</li>\n<li>Internal IP address</li>\n<li>Screen resolution</li>\n<li>Geolocation (latitude/longitude based on IP address)</li>\n<li>Device performance benchmark</li>\n<li>Device bandwidth benchmark</li>\n<li>Device user-agent (browser type, version)</li>\n<li>Device capabilities (Modernizer string for browser capabilities)</li>\n<li>Device operating system</li>\n<li>Device plugins installed</li>\n<li>Browser language</li>\n<li>Flash enabled or disabled</li>\n<li>Device time on file</li>\n<li>Keywords used if coming from search engine</li>\n<li>Pages visited</li>\n<li>Length of visit</li>\n<li>Referral page</li>\n<li>Mouse cursor position</li>\n<li>Mouse clicks</li>\n<li>Page scroll position</li>\n</ul>"},{"sectionTitle":"How to control and delete cookies","sectionText":"<p>You can change your web browser’s settings to refuse or accept cookies. In order to do this, follow the instructions provided by your browser (usually located within the “Help”, “Tools” or “Edit” facility). Alternatively, you can visit <a href=\"http://www.aboutcookies.org/\">www.aboutcookies.org</a> for further information on how to change cookie settings across various browsers (e.g. Mozilla Firefox, Google Chrome, Internet Explorer and Safari). However, please be aware that, if you refuse or disable cookies, some of the Website’s functionality may be lost.</p>\n\n<p>Please note that this will not fully remove the cookies that have already been set on your device. You can delete cookies that have already been placed on your device by following these instructions:</p>\n\n<p><a href=\"http://support.microsoft.com/kb/260971\">Deleting cookies in Internet Explorer</a></p>\n<p><a href=\"http://support.mozilla.org/en-US/kb/Cookies\">Deleting cookies in Firefox</a></p>\n<p><a href=\"https://support.google.com/chrome/bin/answer.py?hl=en-GB&answer=95647&p=cpn_cookies\">Deleting cookies in Chrome</a></p>\n<p><a href=\"http://www.opera.com/browser/tutorials/security/privacy/\">Deleting cookies in Opera</a></p>\n<p><a href=\"https://support.apple.com/kb/index?page=search&q=manage%20cookies%20and%20website%20data&product=&doctype=&currentPage=1&includeArchived=false&locale=en_US&src=globalnav_support&type=organic\">Deleting cookies in Safari</a></p>\n\n<p>For more information on how to opt-out of advertising cookies, you can follow the links in the ‘Advertising Cookies’ section above to the third party websites or you can visit the <a href=\"http://www.networkadvertising.org/managing/opt_out.asp\">Network Advertising Initiative’s opt-out page</a> which provides an online tool for you to remove third party cookies placed by the Network Advertising Initiative’s members from your devices. </p>\n<p>We offer you the ability to opt-out of our use of first-party advertising-related cookies through the AdChoices program. AdChoices is a global program that lets you choose whether to receive customized advertising on our Website and on the websites of our advertising partners. If you prefer not to see customized ads, you can tell us your preference, by clicking on the AdChoices icon located on all advertisements participating in the program. If you opt-out of receiving customized ads, you'll still see advertisements-they just won't be tailored to your interests.</p>\n\n<p>To opt-out of the use of third-party advertising-related cookies and web beacons, see the section Ad Networks and Exchanges authorized by third-parties below. Opting out of our first-party advertising-related cookies, or out of third-party advertising-related cookies as described below, does not necessarily mean that you will not see our advertising - only that this advertising will not be targeted to you through the use of first-party or third-party cookies.</p>\n\n<p>To find information relating to other browsers, visit the browser developer's website. Please be aware that if cookies are disabled, not all features of the Website may operate as intended. Please contact us at <a href=\"mailto:privacyrequest@orders.viagogo.com\">privacyrequest@orders.viagogo.com</a> if you have any questions or concerns.</p>\n\n<p>If you want to clear all cookies left behind by the Websites you have visited, below are links where you can download three programs that clean out tracking cookies:</p>\n\n<ul>\n<li><a href=\"http://www.lavasoftusa.com/products/ad-aware_se_personal.php\">http://www.lavasoftusa.com/products/ad-aware_se_personal.php</a></li>\n<li><a href=\"http://www.spybot.info/en/download/index.html\">http://www.spybot.info/en/download/index.html</a></li>\n<li><a href=\"http://www.webroot.com/consumer/products/spysweeper/\">http://www.webroot.com/consumer/products/spysweeper/</a></li>\n</ul>"},{"sectionTitle":"Contact Information","sectionText":"If you have any queries in relation to this notice or our use of cookies, please contact us at VGL Support Services Ireland Limited via <a href=\"mailto:privacyrequest@orders.viagogo.com\">privacyrequest@orders.viagogo.com</a>."}],"appName":"viagogo-policy"},"sp":{"policyTitle":"seller policies","policySections":[{"sectionNumber":"1","sectionTitle":"Some Of The Things You're Not Allowed To List","sectionText":"<p>Here's a list of ticket types or ticket items that you're not allowed to list for sale.</p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p><b>Listings without event access (Non-event ticket items)</b> - You may only list non-event ticket items as an add-on to your event ticket listings or as otherwise approved by us. The most common forms of non-event items include:</p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list sh-list-circle\">\n<li class=\"sh-content-menu-items\"><p>Pit passes</p></li>\n<li class=\"sh-content-menu-items\"><p>Club passes</p></li>\n<li class=\"sh-content-menu-items\"><p>Party passes</p></li>\n<li class=\"sh-content-menu-items\"><p>Parking passes (may only be sold on their own as part of a \"PARKING ONLY\" event listing created by us).</p></li>\n</ul></li>\n<li class=\"sh-content-menu-item\"><p><b>Tickets for non-consecutive seats</b> - All of the seats in your listing must be together (consecutive). </p></li>\n<li class=\"sh-content-menu-item\"><p><b>Speculative tickets</b> - You must only list tickets that you already have in your possession (‘In Hand’) or that have been allocated to you. Speculative tickets or ‘spec tickets’ are tickets that are listed for sale or sold before the seller actually owns the tickets or before the tickets have been allocated to the seller. Listing or selling speculative tickets on our Site is not allowed and may result in account suspension, fees, charges or other consequences. Sellers who regularly list tickets that are not in their possession and who are known to have listed speculative tickets in the past, may be required to provide an earlier In Hand Date than is normally required (for In Hand Date, see Section 2 below). </p></li>\n<li class=\"sh-content-menu-item\"><p><b>Stolen property</b> - We probably don't need to tell you this, but selling stolen tickets or other stolen items on our Site is against the rules and violates various laws.</p></li>\n</ul>"},{"sectionNumber":"2","sectionTitle":"Rules for Listing Tickets","sectionText":"<p>Providing accurate and complete information about your tickets during the listing process is one of the keys to becoming a successful seller and is a requirement to list on the Site. If you do not follow all of the requirements in this section when listing your tickets, your listings may not appear on the Site, your sale may be canceled, you may not get paid, you may incur fees (associated with us finding replacement tickets for, or refunding, the buyer and/or a fixed admin fee), or you may be subject to other consequences specified in these Seller Policies and Clause 19 of the User Agreement. </p>"},{"sectionNumber":"2.1","sectionTitle":"Accurately tell us when you'll be able to send the tickets to buyers (if your tickets aren't In Hand)","sectionText":"<p><b>For tickets to events located in the US or CANADA (unless otherwise specifically noted)</b></p>\n<br>\n<p>It's OK to list tickets you own but don't have in your possession yet ('Not In Hand') as long as you're absolutely certain you will have them on the date you give us when listing the tickets (the 'In-Hand Date'). The In-Hand Date you select is the beginning of your shipping window to complete the sale. We'll show buyers a delivery estimate based on your In-Hand Date which sets their expectations of when they'll receive the tickets they purchased, so be accurate. If you're not sure when you will have the tickets in your possession, hold off on listing the tickets or select the latest date available on the calendar. If your tickets haven't sold and the In-Hand Date changes, you may change the In-Hand Date without incurring fees. If your tickets have sold and the In-Hand Date changes, you may incur additional fees.</p>\n<br>\n<p><b>For tickets to events located in the European Economic Area (and any countries besides the United States and Canada unless specifically noted)</b></p>\n<br>\n<p>It’s OK to list tickets you own but don't have in your possession yet ('Not In Hand'). Once your tickets have sold we will tell you the deadline by which you must send your tickets (the \"Must Ship by Date\"). If you are unable to send tickets by this date you must let us know immediately or your order may be canceled, and you may be charged.</p>"},{"sectionNumber":"2.2","sectionTitle":"Select the right delivery method for your ticket type","sectionText":"<p>Except for tickets sold through Last Minute Services (LMS), we will show you the delivery methods available for the event during the listing process. Not all delivery methods are available for all events. The delivery method determines the last available date to send tickets that are Not In Hand and the date and time the listing will expire (i.e. no longer be visible to buyers). This allows you adequate time to get tickets to buyers before the event. </p>\n<br>\n<p>For some of our integrated partner teams and venues (such as most Major League Baseball teams in the US), you'll deliver your tickets by entering the barcodes printed on them. This type of delivery applies to all types of tickets and is not the same as electronic delivery of PDF files (see below).</p>\n<br>\n<p>For all other events, when you start listing your tickets on the 'Enter your ticket details' page, you'll select a delivery method based on the type of tickets you have - electronic tickets (e-tickets), paper printouts, or traditional 'hard' tickets (such as tickets printed on card stock). Once your tickets sell, you can't change the delivery met
