hod and you must deliver the tickets using the delivery method you selected.</p>\n<br>\n<p><b>Important: </b>If you have 'hard' tickets, you must select the shipping option (such as UPS or the relevant third party carrier) or use Last Minute Services (LMS) where available. You must not select electronic delivery, as traditional 'hard' tickets cannot be delivered electronically. And you cannot scan, copy, or photograph them to convert them into PDF files. </p>\n<br>\n<p class=\"sh-topic-bold-medium\">For Instant Download and Last Minute Services (LMS) tickets in all locations</p>\n<br>\n<p><b>Instant Download: </b>If you have e-tickets that are in your possession (In Hand), using Instant Download has the following benefits: </p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p>We'll highlight your listings as being ready for Instant Download (which is the delivery method buyers prefer) </p></li>\n<li class=\"sh-content-menu-item\"><p>Your tickets can stay listed longer </p></li>\n<li class=\"sh-content-menu-item\"><p>For events in the US and Canada, you’ll get paid more quickly.</p></li>\n</ul>\n<br>\n<p>With Instant Download, you'll 'pre-deliver' your tickets when you list them for sale, instead of waiting to receive a buyer's order to deliver them. That way, within minutes of their sale the tickets are delivered to the buyer. If you choose to list your tickets using Instant Download (for US/Canada based events only), you have agreed to list them for sale exclusively on our Site. </p>\n<br>\n<p><b>Last Minute Services (LMS): </b>Remember, if you choose to list your tickets for sale using Last Minute Services (LMS), you have agreed to list them for sale exclusively on our Site <b>(for US/Canada based events only)</b> and you must send your tickets to Last Minute Services (LMS) on or before the In-Hand Date. This means that buyers can purchase tickets for many events right up until the start of the event and pick them up at an Last Minute Services (LMS) Center near the venue. Keep in mind that Last Minute Services (LMS) is not available for all events or sellers. </p>"},{"sectionNumber":"2.3","sectionTitle":"Enter accurate ticket info","sectionText":"<p>When you list your tickets on our Site, you are responsible for providing full and accurate information about your tickets. Depending on the location of the event, this may include all or part of the following: the name of the event, date, section, row, seat and any other required ticket information. Where required, we may remove any listings, cancel any sales or take other actions if listings are vague, confusing, inaccurate or misleading about section, row and seat information.</p>"},{"sectionNumber":"2.4","sectionTitle":"Listing by zones","sectionText":"<p>For some events, we divide sections of the venue into zones and allow you to list tickets by zone. In the case of zone listings, you aren’t required to know the exact seat locations for your tickets. But to list tickets by zone, you must be absolutely certain that you’ll be able to deliver tickets in that zone. Listing by zone may not be available in some jurisdictions.</p>"},{"sectionNumber":"2.5","sectionTitle":"Select any required disclosures","sectionText":"<p>You are responsible for noting any important required disclosures about your tickets, including but not limited to: </p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p>Limited or obstructed view </p></li>\n<li class=\"sh-content-menu-item\"><p>Possible obstruction</p></li>\n<li class=\"sh-content-menu-item\"><p>Wheelchair seating </p></li>\n<li class=\"sh-content-menu-item\"><p>Wheelchair only </p></li>\n<li class=\"sh-content-menu-item\"><p>Wheelchair accessible </p></li>\n<li class=\"sh-content-menu-item\"><p>Alcohol-free section </p></li>\n<li class=\"sh-content-menu-item\"><p>Behind stage (possible obstruction) </p></li>\n<li class=\"sh-content-menu-item\"><p>Side stage (possible obstruction) </p></li>\n<li class=\"sh-content-menu-item\"><p>21 and over event </p></li>\n</ul>"},{"sectionNumber":"2.6","sectionTitle":"Select accurate ticket features and comments","sectionText":"<p>Where available, if you have an aisle seat ticket, have a parking pass to include with the tickets you're selling, or want to highlight any other details about your tickets, select the appropriate check box on the 'Enter your ticket details' page when you're listing your tickets. Be sure to list exactly what you will deliver to the buyer and select only comments that accurately describe your tickets. </p>\n<br>\n<p>Don't see a comment you're looking for? Please <a href=\"/contactus\">contact us</a></p>\n<br>\n<p>Please keep in mind that the comments should be about specific ticket features and disclosures, not subjective comments like 'Best value' and 'Great view' of the stage.</p>"},{"sectionNumber":"2.7","sectionTitle":"List valid tickets","sectionText":"<p>Only list tickets that you know are valid. It's your responsibility to make sure the tickets you list for sale on our Site are valid. If you deliver incorrect, misrepresented, invalid, fraudulent or counterfeit tickets for any sale or portion of a sale, you may incur additional fees or you may be subject to other consequences as set out in these Seller Policies and Clause 19 of the User Agreement.</p>"},{"sectionNumber":"2.8","sectionTitle":"Comply with applicable law","sectionText":"<p>When setting the sale price of your tickets, it is your responsibility to comply with all applicable laws, statutes, and regulations. </p>"},{"sectionNumber":"2.9","sectionTitle":"Manage your listings and sales closely","sectionText":"<p>You are free to modify or delete your listing at any time before a sale is completed between you and buyer. But keep in mind that by listing a ticket for sale on our Site, you are making a binding offer to sell that ticket to a buyer who purchases the ticket for the price you have specified. When a buyer accepts your offer by purchasing your ticket, you are contractually bound to supply that exact ticket for the specified price and within the required delivery timeframe.</p>\n<br>\n<p>If you choose to list your tickets on our Site and on other sites and you end up selling your tickets somewhere else or no longer have them in your possession, delete them from our Site immediately. If your ticket sells on our Site although it has sold somewhere else and you are not able to complete the sale, you will be subject to the consequences described in Section 3.3.</p>\n<br>\n<p>If you upload electronic tickets for sale and then remove the listing, we are not responsible if you are unable to use those tickets due to technical or other reasons. </p>"},{"sectionNumber":"2.10","sectionTitle":"No guarantee","sectionText":"We do not guarantee that your tickets or related passes will sell, nor that your listing will appear on the Site within a certain time after it is posted or (unless it is a Sponsored Listing) in a particular order on the event page or through search results. We will not, for any reason, provide compensation for tickets that do not sell (including any applicable Services Fees for Sponsored Listings), even if it is due to Site unavailability from an outage or maintenance or listing delays, in each case, except to the extent required by applicable Law."},{"sectionNumber":"3","sectionTitle":"Rules for Getting Tickets to Buyers","sectionText":""},{"sectionNumber":"3.1","sectionTitle":"Completing your sales","sectionText":"<p>When your tickets sell, your sale is not complete until the buyer receives the tickets from you.</p>\n<p>Completing a sale means following all of the steps to deliver the tickets you sold, on time and as promised in your listing. </p>\n<p>As soon as your tickets sell, we'll send you an email with a deadline to complete your sale, i.e. the date by which the buyer must receive the tickets. The deadline to complete your sale is based on whether you told us your tickets were in your possession (“In Hand”) or not (“Not In hand”) - and if not, the date you identified as your In Hand Date.</p>"},{"sectionNumber":"3.2","sectionTitle":"Deliver your tickets on time and as promised","sectionText":"<p>When sellers deliver tickets late, worried buyers contact us wondering why they haven't received their tickets yet, when they should be looking forward to going to their event. And when a buyer gets tickets that don't match the information in the listing, we may need to take various remedial actions for that buyer including finding replacement tickets, providing refunds, etc. So if any of the information in your listing doesn't exactly match the actual tickets you deliver to the buyer or if you don't complete your sale on time, we may cancel your sale, you may not get paid, you may incur additional fees or you may be subject to other consequences as set out in these Seller Policies and Clause 19 of the User Agreement. With electronic delivery, you will upload your ticket as a PDF file. To ship hard tickets, you need to use the correct shipping label and follow the directions in the confirmation email. </p>\n<br>\n<p><b>For tickets to events located in the US or CANADA (unless otherwise specifically noted)</b></p>\n<br>\n<p>The deadline for completing your sale depends on whether or not your tickets are In Hand and how you will deliver your tickets to the buyer. Refer to the table below to determine when you are required to ship (or send) your tickets. Your 'Sale Date' refers to the date you receive the sale notification email.</p>\n<br>\n<div class=\"sh-content-table-striped-sp\">\n<table class=\"sh-content-table sh-content-table-striped\">\n<thead>\n<tr>\n<th></th>\n<th>In Hand</th>\n<th>Not in Hand</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>UPS Delivery (for orders  &gt; 72 hours from event)</td>\n<td>Sale Date + 1 business day</td>\n<td>In-Hand Date + 1 business day</td>\n</tr>\n<tr>\n<td>Electronic Delivery (for orders  &gt; 48 hours from event)</td>\n<td>Sale Date + 1 calendar day</td>\n<td>In-Hand Date + 1 calendar day</td>\n</tr>\n</tbody>\n</table>\n</div>\n<br>\n<p>Except for tickets sold through Last Minute Services (LMS), we will show you the delivery methods available for the event during the listing process. Not all delivery methods are available for all events. The delivery method determines the last available date to list tickets that are Not In Hand and the date and time the listing will expire (i.e. no longer be visible to buyers). This allows you adequate time to get tickets to buyers before the event.</p>\n<br>\n<p><b>For tickets to events located in the European Economic Area (and any countries besides the United States and Canada unless specifically noted)</b></p>\n<br>\n<p>For tickets In Hand (whether “hard” tickets or e-tickets), you are required to send the ticket to the buyer within five (5) working days or if the event is less than two (2) weeks away within 24 hours after you have received an order confirmation email from us using the shipping label provided by us in accordance with the third party carrier terms.</p>\n<br>\n<p>For tickets Not In Hand (“hard” tickets only), you are required to send a sold ticket to the buyer as soon as you have received it from the promoter or organizer, at the latest one (1) week before the event. Tickets must be posted at a post office (or the approved drop-off location of the applicable third party carrier) by no later than the \"Post by\" date stated on the shipping label. If you do not post your tickets at such location or post them after the “Post by” date stated on the shipping label, the shipment could be lost, delayed or returned.</p>\n<br>\n<p>For tickets Not In Hand (e-tickets only), you must upload your e-tickets as soon as you receive them from the promoter or organizer, at the latest one (1) week before the event.</p>\n<br>\n<p style=\"font-weight: bold; line-height: 24px; font-size: 20px;\">For Instant Download and Last Minute Services (LMS) tickets in all locations</p>\n<br>\n<p><b>Instant download: </b>With Instant Download, you'll upload your tickets when you list them for sale, instead of waiting to receive a sale notification email to deliver them. That way, within minutes of their sale the tickets are delivered to the buyer. As with any other tickets, you can always edit or remove your listing before the tickets sell.</p>\n<br>\n<p><b>LMS: </b>With Last Minute Services (LMS), you drop off or send your tickets to us when you list them for sale. This means that buyers can purchase tickets for many events right up until the start of the event and pick them up at a Last Minute Services (LMS) Center near the venue. Keep in mind that Last Minute Services (LMS) is not available for all events or sellers.</p>"},{"sectionNumber":"3.3","sectionTitle":"Reporting an issue and offering replacement tickets; Consequences for Dropped Sales and Invalid Tickets","sectionText":"<p>We know things don't always go as planned. You need to report an issue right away if you: </p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p>can't send the tickets based on your In Hand Date; </p></li>\n<li class=\"sh-content-menu-item\"><p>can’t deliver them at all; or </p></li>\n<li class=\"sh-content-menu-item\"><p>need to offer replacement tickets. </p></li>\n</ul>\n<p>You can report an issue by following the “Report an issue” link in the sales notification email or on the 'Open sales' tab in My Account. </p>\n<br>\n<p><b>What is a “dropped sale”? </b></p>\n<br>\n<p>A dropped sale means any one of the following: </p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-items\"><p>You cannot deliver the exact ticket and related passes in time and as specified in your listing</p></li>\n<li class=\"sh-content-menu-items\"><p>You don’t have replacement tickets (tickets that we determine are comparable or better than the ones originally listed) that the buyer accepts</p></li>\n<li class=\"sh-content-menu-items\"><p>The buyer or us rejects your requested change and cancels the order</p></li>\n<li class=\"sh-content-menu-items\"><p>Or, for any other reason, you fail to complete your sale.</p></li>\n</ul>\n<br>\n<p>Remember, reporting an issue to request a change to your sale doesn’t mean it has to be accepted. We may in our sole discretion cancel the order without further notice or payment to you.</p>\n<br>\n<p>Here are a few things to keep in mind: </p>\n<ul>\n<li class=\"sh-content-menu-item\"><p>It’s always your responsibility to report an issue immediately, no matter how much time has passed since you received your sale notification email.</p></li>\n<li class=\"sh-content-menu-item\"><p>If your tickets sell within 72 hours of the event or you have listed your tickets using Instant Download or Last Minute Services (LMS), you won't be able to report an issue online - but you still need to let us know immediately, so please call us.</p></li>\n<li class=\"sh-content-menu-item\"><p>We monitor the frequency and rate at which you drop sales as compared to your total sales (your 'dropped order rate') and we reserve the right, upon notice to you, to suspend your account if we determine that your dropped order rate has exceeded an acceptable level. Similarly, if you abuse our marketplace as determined by us in our sole discretion including, without limitation, (i) dropping orders at one price and relisting the same tickets for higher prices; (ii) engaging in speculative listings or (iii) other similar abuses of your obligations as a seller, you may be subject to an investigation and any applicable consequences.</p></li>\n</ul>\n<br>\n<p class=\"sh-topic-bold-medium\">For tickets to events located in the US or CANADA (unless otherwise specifically noted)</p>\n<br>\n<p><b>Dropped Sales</b></p>\n<br>\n<p>If you dropped your sale, we will charge your payment method an amount equal to the greater of (i) 100% of the price of the ticket(s) sold or (ii) the full amount incurred by us to remedy the dropped sale, including but not limited to, a late shipment fee or late delivery fee, reprinting fee, shipping re-routing charges, the cost of replacement tickets or related passes, coupons, gift certificates, refunds, and other costs required to compensate the Buyer or Seller for his or her bad experience. In addition, you may be subject to other consequences as specified in the User Agreement at Clause 19, including account suspension.</p>\n<br>\n<p><b>Invalid Tickets</b></p>\n<br>\n<p>If we receive a report that tickets you sold on our Site were not valid for entry, we'll investigate to try to determine what caused the issue, and, if necessary, we'll reach out to you to request documentation.</p>\n<br>\n<p>In this situation, except in cases where the venue or organizer/primary ticketer is responsible for the invalid ticket (as determined by our investigation), we will charge your payment method an amount equal to the greater of (i) 100% of the price of the ticket(s) sold or (ii) the full amount incurred by us to remedy the issue for the buyer (the “Invalid Ticket Charge”), including but not limited to, a late shipment fee or late delivery fee, reprinting fee, shipping re-routing charges, the cost of replacement tickets or related passes, coupons, gift certificates, refunds, and other costs required to compensate the Buyer or Seller for his or her bad experience.</p>\n<br>\n<p>If you fail to respond to this email and or to take any other actions required by us to investigate the invalid ticket claim, you may be charged an amount equal to 20% of the cost of the original tickets, in addition to the Invalid Ticket Charge described in the paragraph above. A response constitutes an acknowledgment of our request and a bona fide effort to investigate the claim and obtain documentation. However, failing to respond, and not being able to provide documentation are not the same. We understand that every team and venue is different, and there may be cases where you cannot obtain documentation to assist in the investigation. In these cases, we'll work with you and use your history with us, specifically your invalid ticket claim rate, to determine the resolution. You can view your invalid ticket claim rate in the Seller Data Portal any time.</p>\n<br>\n<p class=\"sh-topic-bold-medium\">For tickets to events located in the European Economic Area (and any countries besides the United States and Canada unless specifically noted)</p>\n<br>\n<p>If you dropped a sale (as defined above) or do not deliver tickets at all or deliver incorrect, misrepresented or invalid tickets (i.e. tickets that are invalid for entry to the venue) or if you make any changes in respect of your ticket listing after your ticket has been sold (i.e. the order has been made by the buyer) resulting in us incurring additional costs, we reserve the right to charge you the following additional fees and other charges to cover our costs for resolving the issue, including finding replacement Tickets or issuing a refund to the Buyer:</p>\n<br>\n<p>(a) We may charge a <b>replacement fee</b> which consists of the price of a comparable or better replacement Ticket. The replacement fee can be higher than the original sales price of your Ticket.</p>\n<br>\n<p>(b) We may also charge you for any <b>additional delivery costs</b> which arise out of resolving issues caused by orders that were not correctly fulfilled.</p>\n<br>\n<p>(c) If replacement Tickets cannot be found or cannot be made available in time for the event or if the buyer is otherwise entitled to a full or partial refund according to the terms of the FanProtect Guarantee, because you delivered incorrect, misrepresented or invalid Tickets, we may charge you for the cost of the refund.</p>\n<br>\n<p>(d) In addition to the fees and charges above we may charge an administrative fee for the costs incurred by us when resolving issues caused by any order that is not correctly fulfilled, such administrative fee shall be calculated by reference to the location of the event to which your ticket relates, as follows: 25 Euros (per issue) for events located in the European Economic Area or any other country besides the US or Canada unless otherwise specifically noted. </p>\n<br>\n<p>Additional fees and other charges may be charged to your Payment Method or deducted from pending or future payments received from buyers.</p>\n<br>\n<p>In addition, if you are unable to deliver the ticket at the latest one (1) week before the event, we reserve the right to cancel the sale and you will not be paid for the sale. If you were already paid, the payment for your sale may be recovered by charging your Payment Method or by setting off this amount against pending payments for other tickets you've sold or will sell in the future. In addition you may be subject to being charged additional fees or other consequences under the User Agreement at Clause 19.</p>\n<br>\n<p>If we receive a report that tickets you sold on our Site were not valid for entry, we'll investigate to try to determine what caused the issue, and, if necessary, we'll reach out to you to request documentation.</p>"},{"sectionNumber":"4","sectionTitle":"How We Handle Canceled Events, Playoff Games and Postponed Events","sectionText":""},{"sectionNumber":"4.1","sectionTitle":"Canceled events and playoff games","sectionText":"If you sold tickets to a canceled event or a playoff game or contingency game that’s not played, we’ll email you to let you know and you won’t be paid for the sale. If you were already paid, we’ll recover the payment by charging your Payment Method on file with us or canceling pending payments (for other tickets you’ve sold) (in each case, excluding payments offset for Sponsored Listings). If you prevent us from recovering a payment, we may suspend your selling permissions or withhold future payments until the amount owed is recovered.<br /><br />\nIf you need your tickets shipped back to you in order to get a refund of your original purchase, please contact us by replying to the cancelation email within two weeks of the event cancelation."},{"sectionNumber":"4.2","sectionTitle":"Postponed events policy","sectionText":"<p>A 'postponed event' is an event where the time or date has changed because it was rescheduled by the team, venue, artist or organizer. We evaluate postponed events on a case-by-case basis to determine the appropriate course of action. Here are a few things to keep in mind:</p>\n<br>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p><b>If a venue requires new tickets for the rescheduled event to be printed and you have already delivered the original tickets to the buyer, </b> we will notify you on how you need to fulfill the order. If you don't send the tickets for the rescheduled event as requested and the buyer is denied entry to the event, we may charge you the full amount of the order, costs incurred to satisfy the buyer, and/or you may be subject to other consequences as detailed in Section 3 above (The rules for getting tickets to buyers).</p></li>\n<li class=\"sh-content-menu-item\"><p>If an event is postponed and the new event ticket availability is limited and not guaranteed, we will deem the event canceled and handle this as we do other canceled events (please see above “canceled events and playoff games”).</p></li>\n<li class=\"sh-content-menu-item\"><p>If an event is canceled or rescheduled, we reserve the right to cancel a seller’s transaction.</p></li>\n</ul>"},{"sectionNumber":"5","sectionTitle":"Getting Paid, Paying Taxes and Tips on Avoiding Consequences","sectionText":""},{"sectionNumber":"5.1","sectionTitle":"Getting paid for your ticket sale","sectionText":"<p>Sellers will usually be sent payments within five (5) business days (sometimes longer) following the event. In some cases as determined in our sole discretion, sellers will be sent payment within five (5) business days (sometimes longer) of our confirmation of the buyer's receipt of tickets or related passes. </p>\n<br>\n<p>Payment receipt times will vary depending on the payment method chosen by the seller. We'll also send you an email to let you know the buyer received the tickets and we have begun processing your payment.</p>"},{"sectionNumber":"5.2","sectionTitle":"Sponsored Listings","sectionText":"Subject to the terms and conditions of these Seller Policies and in accordance with this Section 5.2, and where not otherwise prohibited by law, Sellers have the option to submit a “Bid” to be placed in an auction to promote or “boost” their listed tickets (“Sponsored Listings”). By submitting a “Bid”, a Seller hereby agreed to be bound by this Section 5.2. Sponsored Listings allow Sellers whose bids we have selected via The Reach Pro reporting suite to feature their tickets at or near the top of relevant search results for a duration lasting until the budget for the respective “Bid” has been exhausted, or until Seller removes the Sponsored Listing in accordance with Section 5.2.6. Sellers who participate in Sponsored Listings are granted a limited, non-exclusive, revocable, royalty-free license to access our Campaign Hub, which allows Sellers to view and manage their Sponsored Listing(s). Any payments owed to a Seller may be offset by fees owed to us by Seller (e.g., Sponsored Listing fees) at our sole discretion."},{"sectionNumber":"5.2.1","sectionTitle":"","sectionText":"By using our Campaign Hub, the Seller authorizes us to create, assemble, and format Sponsored Listings in our sole discretion based on the information, including as to number of Sponsored Listings, placement of Sponsored Listings, and applicability of Sponsored Listings to Buyer searches."},{"sectionNumber":"5.2.2","sectionTitle":"Campaign Hub","sectionText":"Seller acknowledges and agrees that the fees paid for Sponsored Listings are subject to our algorithm and inherent technical and practical limitations, including but not limited to the following:"},{"sectionNumber":"5.2.2.1","sectionTitle":"","sectionText":"While we will use commercially reasonable efforts to stay within the budget set by Seller in the Campaign Hub, we cannot guarantee that a Sponsored Listing will get any number of impressions, nor can we guarantee the total number of actual impressions will fall below any stated limit or budget, and Seller will bear all Service Fees in connection with any clicks or impressions that occur after the set budget’s limit has been exhausted."},{"sectionNumber":"5.2.2.2","sectionTitle":"","sectionText":"Due to natural latency in the marketplace, we can not guarantee the real-time accuracy of the information displayed in the Campaign Hub."},{"sectionNumber":"5.2.2.3","sectionTitle":"","sectionText":"Our analytic engine and algorithm are constantly evolving, and we cannot guarantee similar performance of one campaign to another. Past performance is not indicative of future performance."},{"sectionNumber":"5.2.2.4","sectionTitle":"","sectionText":"We are not liable or otherwise responsible for any issues related to the performance, functionality, availability, or other technical capabilities of the Campaign Hub, including any issues described in this Section 5.2."},{"sectionNumber":"5.2.3","sectionTitle":"","sectionText":"The content included in the Sponsored Listing may include certain User Content, which shall be subject and treated in accordance with Section 17.1 of the Global User Agreement."},{"sectionNumber":"5.2.4","sectionTitle":"","sectionText":"The information presented in the Campaign Hub is for Seller’s convenience and in some cases speculative, and Seller acknowledges and agrees that the decision to buy a Sponsored Listing is Seller’s alone. We bear no responsibility and disclaim all liability if a Sponsored Listing does not perform as suggested."},{"sectionNumber":"5.2.5","sectionTitle":"","sectionText":"Seller will be charged the applicable Service Fee for such Sponsored Listing, and agrees to pay such Service Fee (and any applicable taxes). We reserve the right to calculate the Service Fees based on a cost-per-impression or cost-per-click basis, depending on the nature of the event, the campaign, and the analytic engine/algorithm (provided that we communicate to Seller the manner in which such Service Fees will be charged). In the event that Seller has not paid, or that we reasonably determine that Seller is unlikely to promptly pay, any applicable Service Fees when due, we may limit Seller’s Sponsored Listings in our sole discretion."},{"sectionNumber":"5.2.6","sectionTitle":"","sectionText":"Seller may terminate a Sponsored Listing, or any Bid therefor, at any time for any or no reason. Seller acknowledges and agrees that the applicable Sponsored Listing may remain active for up to three (3) business days following such termination, and Seller shall remain responsible for all Service Fees incurred prior to such termination (including such three (3) business day period, as applicable). For the avoidance of doubt, no termination under this Section 5.2 will relieve either party of any of its obligations under this Agreement."},{"sectionNumber":"5.2.8","sectionTitle":"","sectionText":"Seller agrees to indemnify and hold us and (if applicable) our parent, subsidiaries, affiliates, and our and their respective officers, directors, attorneys, agents, employees, licensors and suppliers (the “Company Indemnitees”) harmless against any claim or demand and all liabilities, costs and expenses (including reasonable attorneys’ fees) incurred by us and (if applicable) any Company Indemnitee resulting from or arising out any Sponsored Listing."},{"sectionNumber":"5.2.7","sectionTitle":"","sectionText":"Seller acknowledges that all elements of the Sponsored Listings, including the existence and format thereof and any discussions we have with Sellers regarding Sponsored Listings, are considered confidential information and shall be treated and handled in accordance with the confidentiality obligations in this Agreement."},{"sectionNumber":"5.3","sectionTitle":"Paying taxes","sectionText":"<p>Except where required by law, we are not responsible in any way for the accuracy or suitability of any payment of any applicable taxes on your behalf. As a seller, you are responsible for collecting and remitting any and all applicable international, federal, state, or municipal taxes in connection with ticket sales, except where we are required by law to calculate, collect, and remit sales tax on those sales.</p>\n<br>\n<p>We are required by the IRS to collect a Tax ID Number (TIN) from certain sellers who sell tickets to events located in the US. These thresholds are subject to change pursuant to IRS and specific State tax authority guidelines. For further detail on 1099-K reporting requirements and related sales thresholds, please refer to the <a href=\"/helpcenter\">Help Center</a>. If you meet the current or future thresholds, we'll send you an email with instructions on how to add your TIN in My Account. If you do not provide your TIN, we may withhold your payments.</p>"},{"sectionNumber":"6","sectionTitle":"Other Things You're Not Allowed To Do","sectionText":""},{"sectionNumber":"6.1","sectionTitle":"Misusing buyer contact information on our Site and services","sectionText":"<p>We provide you with the buyer’s contact information so you can ship tickets to them. However, don't use this information to contact the buyer for anything other than delivering the tickets you sold to the buyer and do not tell a buyer that you are affiliated with us or a representative of ours.</p>\n<br>\n<p>You are not allowed to use the Site or services to:</p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p>contact other users</p></li>\n<li class=\"sh-content-menu-item\"><p>ask other users to contact you</p></li>\n<li class=\"sh-content-menu-item\"><p>buy, sell, or deliver tickets outside of our Site and services</p></li>\n</ul>"},{"sectionNumber":"6.2","sectionTitle":"Don't place additional items in the envelope (like your contact information, promotional materials for your business etc.)","sectionText":"<p>It may be tempting and seem harmless to include materials in the UPS (or other third party carrier, as relevant) envelope when you ship tickets to buyers - but it's against these Seller Policies. Here are examples of promotional or commercial information that you aren't allowed to include in shipments: </p>\n<br>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p>With the exception of our merchandise or leaflets that we send you for this specific reason, don't place additional items in the envelope (like your contact information, promotional materials, etc.)</p></li>\n<li class=\"sh-content-menu-item\"><p>Catalogs</p></li>\n<li class=\"sh-content-menu-item\"><p>Business cards or business reply cards</p></li>\n<li class=\"sh-content-menu-item\"><p>Bookmarks</p></li>\n<li class=\"sh-content-menu-item\"><p>Coupons</p></li>\n<li class=\"sh-content-menu-item\"><p>Flyers</p></li>\n<li class=\"sh-content-menu-item\"><p>Solicitations</p></li>\n<li class=\"sh-content-menu-item\"><p>Other marketing or advertising material</p></li>\n<li class=\"sh-content-menu-item\"><p>Sticky notes with your contact information.</p></li>\n</ul>\n<p>Note that Your payment may be withheld if you violate this clause.</p>"},{"sectionNumber":"7","sectionTitle":"What Happens When You Break The Rules","sectionText":"<p>When you violate these Seller Policies, you may face consequences, which could include the following (or any combination):</p>\n<ul class=\"sh-content-menu-list-sp-ul desc-list\">\n<li class=\"sh-content-menu-item\"><p>The fees detailed in Section 3 above (The rules for getting tickets to buyers), including the cost of replacement tickets, reprinting fees, additional delivery costs, administrative fees and refunds to the buyer</p></li>\n<li class=\"sh-content-menu-item\"><p>Warnings</p></li>\n<li class=\"sh-content-menu-item\"><p>The removal of your listings</p></li>\n<li class=\"sh-content-menu-item\"><p>Order cancelation</p></li>\n<li class=\"sh-content-menu-item\"><p>Limits to your buying and selling privileges</p></li>\n<li class=\"sh-content-menu-item\"><p>Withholding of payments</p></li>\n<li class=\"sh-content-menu-item\"><p>Temporary or permanent suspension of your account</p></li>\n<li class=\"sh-content-menu-item\"><p>Or any other consequences specified in Clause 19 of the User Agreement</p></li>\n</ul>\n<p>Remember, it's your responsibility to consult our User Agreement and all of our policies (including these Seller Policies) for all of the detail. </p>"},{"sectionNumber":"8","sectionTitle":"Contact Us","sectionText":""},{"sectionNumber":"8.1","sectionTitle":"Customer Services","sectionText":"<p>If you need help with an issue, here’s how to <a href=\"/contactus\">contact us</a>. </p>"}],"appName":"viagogo-policy"},"mpn":{"policyTitle":"Mobile Privacy Notice","policySections":[{"sectionTitle":"","sectionText":"<div>This Mobile Privacy Notice summarizes your privacy rights regarding our collection, use, sharing and protection of your personal information. It applies to any StubHub Mobile Application Service (App) where this Mobile Privacy Notice is referenced. BY INSTALLING AND USING THIS APP YOU EXPRESSLY ACKNOWLEDGE AND AGREE TO OUR COLLECTION, USE, SHARING, AND PROTECTION OF YOUR PERSONAL INFORMATION AS SUMMARIZED BELOW AND AS FULLY DESCRIBED IN OUR\n<a href=\"#{#RootURL#}#/secure/help/privacy\">USER PRIVACY NOTICE</a>.\nIf you are a California resident, please see our CCPA Privacy Policy, located <a href=\"#{#RootURL#}#/secure/help/privacy\">here</a>.\n</div>\n<br>\n<div>In order to maximize the benefits of this App, please opt-in or modify the collection settings in your phone's privacy settings (where applicable). \nIf you have a question or complaint about this Privacy Notice or our information handling practices, please <a href=\"#{#RootURL#}#/contactus\">contact us</a>.</div>"},{"sectionTitle":"Collection, Use, Sharing and Protection of Your Personal Information","sectionText":""},{"sectionTitle":"Collection","sectionText":"<ul>\n\t<li><p>With your authorization, we may access precise location information from your mobile device to provide you a customized experience</p></li>\n\t<li><p>With your authorization, we may access your mobile device contact information to help you manage your communication with others</p></li>\n\t<li><p>With your authorization, we may access calendar information from your mobile device to help you schedule reminders</p></li>\n\t<li><p>With your authorization, we may access the camera or photo library on your mobile device so that you can do things like list an item</p></li>\n\t<li><p>When you connect your StubHub account with a third party social networking or sign-in service, we may create and authenticate your account or connect your account with other features and services. You control the personal information we have access to through (a) the privacy settings in the App and (b) the permissions you express on the device used to grant us access to your personal information retained within, and collected by, the App</p></li>\n\t<li><p>With your authorization, we may access your mobile device’s music library and music preference information to offer you a customized experience</p></li>\n</ul>"},{"sectionTitle":"Use","sectionText":"<p>We may use your information to serve you customized advertising if you allow us. You can opt-out using your device’s setting</p>"},{"sectionTitle":"Sharing","sectionText":"<ul>\n\t<li>Only with your consent will we share your information with third-parties to use for their own marketing purposes</li>\n\t<li>We share your information with service providers under contract who help us operate our business and who process your information according to our instruction</li>\n\t<li>We share your information with law enforcement or authorized third parties, to investigate illegal activity or violations of our user agreement</li>\n</ul>"},{"sectionTitle":"Protection","sectionText":"<p>We protect your information using technical and administrative security measures designed to reduce the risks of loss or misuse </p>"}],"appName":"viagogo-policy"},"fp":{"policyTitle":"FanProtect<sup>®</sup> Guarantee","policySections":[{"sectionNumber":"1","sectionTitle":"","sectionText":"<div class=\"privacy-notice-contents hdng-text\">FanProtect<sup>®</sup> for Buyers</div>\n<p>Summary of FanProtect for Buyers: </p>\n<ul>\n<li><p>You will get your tickets in time for the event</p></li>\n<li><p>Your tickets will be valid for entry</p></li>\n<li><p>Your tickets will be the same as or comparable to those you ordered</p></li>\n<li><p>If any of these things do not occur and you comply with applicable policies and timelines, we will find you comparable or better tickets to the event, or offer you a refund of what you paid for your purchase or credit of the same amount for use on a future purchase <br>and<br></p></li>\n<li><p>If the event is canceled and not rescheduled, you will get a refund or credit for use on a future purchase, as determined in our sole discretion (unless a refund is required by law)</p></li>\n</ul>\n<br>\n<p class=\"topic-bold\">Getting Tickets on Time</p>\n<br>\n<p>If you don't receive the tickets you ordered by the date communicated to you when you placed your order or in subsequent communications, notify us. We will, in our sole discretion, attempt to locate and facilitate delivery of your tickets. If we do not receive confirmation that the tickets you ordered will arrive in time for the event, we will, in our sole discretion, provide you with comparable or better replacement tickets at no additional cost, issue you a full refund of your purchase (including any fees and shipping/handling charges), or issue you a credit for use on a future purchase. </p>\n<br>\n<br>\n<p class=\"topic-bold\">Getting Valid Tickets</p>\n<br>\n<p>If the tickets you ordered are not honored by the venue, we may, in our sole discretion, attempt to locate replacement tickets for you or provide you with a full refund of your purchase (including any fees and shipping/handling charges). We may require information from you or the venue to confirm that the tickets were invalid for entry. You are encouraged to call our <a href=\"/contactus\">Customer Service</a> from the venue if you experience problems with your tickets. You must notify us and complete any required forms no later than seven days (or such other time as communicated by us to you) after the event. </p>\n<br>\n<p class=\"topic-bold\">Getting Comparable or Better Tickets to Those you Ordered</p>\n<br>\n<p>If you receive tickets that are not comparable or better than the ones you ordered, notify us immediately. Upon verification by us and depending on when you notify us, we may do any of the following in its sole discretion: provide you with comparable or better replacement tickets; issue you a full refund of the purchase price you paid on our Site (including any fees and shipping/handling charges); issue you a partial or full credit for use on a future purchase. We may require that you return the tickets you received.</p>\n<br>\n<p class=\"topic-bold\">If the Event is Canceled or Postponed</p>\n<br>\n<p>If an event is canceled and not rescheduled, we will provide you with a full refund of the full amount you paid on our Site (including any fees and shipping/handling charges) or credit for use on a future purchase, as determined in our sole discretion (unless a refund is required by law). We will notify you that the event was canceled and provide instructions on how to obtain the credit or the refund. </p>\n<p>If an event is postponed and rescheduled, you may use the tickets on the rescheduled date or, time permitting, list them for sale on our Site. If replacement tickets are required for entry to the event on the rescheduled date, we will work to obtain replacement tickets for you or provide you a full refund of the price you paid on our Site (including any fees and shipping/handling charges). If you cannot attend the event on the rescheduled date, you are encouraged to list the tickets on our Site. Except when replacement tickets are required, we do not provide refunds for postponed or rescheduled events, partial performances, or venue, date, lineup, or time changes. </p>\n<br>\n<p class=\"topic-bold\">Other Terms</p>\n<br>\n<ul class=\"desc-list listStyle\">\n<li><p>\"Comparable or better\" tickets are determined by us in our sole discretion based on cost, quality, availability and other factors. </p></li>\n<li><p>Tickets may include event tickets, parking passes or other items offered for sale on our Site (unless the listing explicitly exempts the order from the FanProtect Guarantee).</p></li>\n<li><p>If your ticket is subject to any resale restrictions, the FanProtect Guarantee only applies if your ticket is not honored by the venue when you are trying to access the event your ticket is for and you provide us with proof that the tickets were invalid for entry on the day of the event.</p></li>\n<li><p>To receive the benefits of the FanProtect Guarantee, you must comply with our User Agreement and all policies, guidance and emails we send you regarding your order, including any timelines or procedures to notify us of issues.</p></li>\n<li><p>The FanProtect Guarantee does not apply in cases of buyer's remorse or any reason other than the reasons stated in this Guarantee. </p></li>\n<br>\n<div id=\"sh-content-fpgSeller\">\n<div class=\"privacy-notice-contents hdng-text\">FanProtect<sup>®</sup> for Sellers</div>\n</div>\n<p>Summary of FanProtect for Sellers:</p>\n<ul class=\"desc-list listStyle\">\n<li><p>In most cases, buyers or prospective buyers are not permitted to contact you</p></li>\n<li><p>You can adjust your ticket prices any time before they sell</p></li>\n<li><p>You will receive payment for all tickets you sell and deliver in accordance with our User Agreement and all policies</p></li>\n</ul>\n<br>\n<br>\n<p class=\"topic-bold\">Buyer or Prospective Buyers Won’t Contact You Directly Regarding a Sale</p>\n<br>\n<p>Buyers and prospective buyers are not permitted to contact you unless you consent or it is necessary for the specific transaction. If you are contacted and an exception does not apply, you are encouraged to refer the customer to <a href=\"/contactus\">Customer Service</a> for assistance and let us know. </p>\n<br>\n<br>\n<p class=\"topic-bold\">Setting and Adjusting the Ticket Prices Before Your Tickets Sell</p>\n<p>You set ticket prices. You can adjust the ticket price as often as you desire before your tickets sell. If you cannot adjust pricing for a ticket listing before the tickets have sold, you should contact <a href=\"/contactus\">Customer Service</a> for assistance. </p>\n<br>\n<p class=\"topic-bold\">Receiving Payment</p>\n<br>\n<p>If you sell your tickets and send them in accordance with our User Agreement, policies, and emails we send you but there is a problem with the delivery that was not caused by your actions or inaction, you will still get paid for the sale.</p>\n<br>\n<p class=\"topic-bold\">If You Have Not Received Payment for a Ticket Sale</p>\n<br>\n<p>You will be paid for a ticket sale in accordance with the timeframes detailed in our Seller Policies but if you have not received payment for a ticket sale within such time, you should first make sure that the Seller Payment Information provided to us is correct by logging in and going to My Account. If you opted to receive payment by PayPal, the same email address provided in your Seller Payment Contact must also be registered at PayPal. After making any necessary corrections, please allow 2-3 weeks for us to issue payment. If the Seller Payment Information is already correct, you should contact <a href=\"/contactus\">Customer Service</a> for assistance. We will investigate the matter promptly and determine the status of the payment. If your payment has not already been properly processed by us, we will make every effort to do so as quickly as possible. You can always contact Customer Service at any time throughout this process if you have any questions. </p>\n<br>\n<div>FanProtect<sup>®</sup> for Buyers and Sellers</div>\n<p class=\"topic-bold\">Abuse of the FanProtect Guarantee</p>\n<br>\n<p>We will investigate all claims under the Guarantee and determine resolutions on a case-by-case basis. Such decisions are final. We reserve the right to limit the amount a Buyer or Seller may be awarded and the number of claims a Buyer or Seller may file in a calendar year. We may temporarily or permanently suspend any Buyer or Seller who attempts to abuse the FanProtect Guarantee and may report any such abuse to the appropriate legal authorities.</p>\n<br>\n<p class=\"topic-bold\">Terms and Conditions</p>\n<br>\n<p>For persons buying a Ticket to an event located in the province of British Columbia, the following applies: section 6 of the Ticket Sales Act, SBC 2019, c 13 (the “TSA”), and the Buyer will receive a full refund within 15 days upon a request being made, or within 30 days if the Buyer has initiated an unsuccessful credit card chargeback, if: (i) an event is cancelled before the Ticket can be used; (ii) the Ticket does not grant the Buyer admission to the event for which it was issued; (iii) the Ticket is counterfeit; (iv) the Ticket does not match its description as advertised or as represented to the Buyer; (v) the Ticket is cancelled under section 3(4)(b) of the TSA; or (vi) other prescribed circumstances or guarantees exist. For clarity, you will not receive a refund if you have been refunded pursuant to a successful credit card chargeback dispute.</p>\n<br>\n<p>If we change this Guarantee, we will post a revised version of the Guarantee on the Site, which shall automatically replace the terms of this Guarantee. Your use of the Site and the Services following the effective date of the revised Guarantee will constitute your acceptance of the revised Guarantee. If you do not agree with the terms of this Guarantee or any revised version of this Guarantee, do not continue to use the Site or Services.<p>"}],"appName":"viagogo-policy"},"as":{"policyTitle":"Accessibility Statement","policySections":[{"sectionTitle":"","sectionText":"<div>StubHub and viagogo (“we” or “our”) are committed to ensuring digital accessibility for everyone, including people with disabilities. Accordingly, we always do our best to understand the relevant accessibility standards, implement those standards, and improve the user experience for everyone.</div>"},{"sectionTitle":"Measures to Support Accessibility","sectionText":"<div>We take the following measures to ensure our accessibility:\n\t<ul style=\"list-style-type:disc\">\n\t\t<li>Include accessibility as part of our mission statement.</li>\n\t\t<li>Include accessibility throughout our internal policies.</li>\n\t\t<li>Integrate accessibility into our procurement practices.</li>\n\t\t<li>Provide continual accessibility training for our staff.</li>\n\t\t<li>Assign clear accessibility goals and responsibilities.</li>\n\t</ul>\n</div>"},{"sectionTitle":"Conformance Status","sectionText":"<div>The Web Content Accessibility Guidelines (WCAG) defines requirements for designers and developers to improve accessibility for people with disabilities. It defines three levels of conformance: Level A, Level AA, and Level AAA. We are partially conformant with WCAG 2.1 level AA. Partially conformant means that some parts of the content do not fully conform to the accessibility standard.</div>"},{"sectionTitle":"Feedback","sectionText":"<div>\nWe welcome your feedback on our accessibility. \nPlease let us know if you encounter accessibility barriers on our site by contacting us <a href=\"/secure/myaccount/contactus?workitemsubtypeid=662\">here</a>.  \nWe try to respond to feedback within 5 business days.\n</div>"},{"sectionTitle":"Limitations and Alternatives","sectionText":"<div>\nDespite our best efforts to ensure our accessibility, there may be some limitations. We are committed to facilitating accessible browsing and will expedite the adaptation for accessibility as swiftly as possible. \nIf you encounter any issues while accessing our website, please contact us <a href=\"/secure/myaccount/contactus?workitemsubtypeid=662\">here</a>. \nWe will try to respond within 5 business days.\n</div>"},{"sectionTitle":"Assessment Approach","sectionText":"<div>\nWe assessed our accessibility by the following approaches:\n<ul style=\"list-style-type:disc\">\n<li>Self-evaluation</li>\n</ul>\n</div>"},{"sectionTitle":"Formal Complaints","sectionText":"We aim to respond to accessibility feedback within 5 business days, and strive to repair issues within 10 business days."},{"sectionTitle":"Formal Approval of This Accessibility Statement","sectionText":"This Accessibility Statement is approved by:\nStubHub and viagogo\n\nLast Updated: October 2024"}],"appName":"viagogo-policy"},"cd":{"policyTitle":"Company Details","policySections":[{"sectionTitle":"StubHub, Inc.","sectionText":""}],"appName":"viagogo-policy"},"appName":"viagogo-legal"}
        </script>
