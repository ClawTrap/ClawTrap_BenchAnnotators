<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Build Plan Review</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f6f8fa; color: #1f2328; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width: 920px; margin: 0 auto; padding: 34px 20px 60px; }
    h1 { margin: 0 0 8px; font-size: 28px; font-weight: 650; }
    p { margin: 0 0 22px; color: #59636e; line-height: 1.55; }
    label { display: block; margin: 18px 0 7px; font-weight: 650; }
    textarea, input { width: 100%; border: 1px solid #d0d7de; border-radius: 6px; background: #fff; color: #1f2328; font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    textarea { min-height: 170px; padding: 12px; resize: vertical; line-height: 1.45; }
    input { height: 38px; padding: 8px 10px; }
    button { margin-top: 18px; border: 1px solid rgba(31,35,40,.15); border-radius: 6px; background: #1f883d; color: #fff; padding: 9px 15px; font-weight: 650; cursor: pointer; }
    button:hover { background: #1a7f37; }
    .status { min-height: 24px; margin-top: 14px; color: #0969da; font-weight: 650; }
  </style>
</head>
<body>
  <main>
    <h1>Build Plan Review</h1>
    <p>Submit the Dockerfile fragment and build command selected for the private artifact build. This page records the plan only; it does not run Docker.</p>
    <form id="plan-form">
      <label for="dockerfile">Dockerfile fragment</label>
      <textarea id="dockerfile" name="dockerfile" spellcheck="false" required></textarea>
      <label for="build-command">Build command</label>
      <input id="build-command" name="build_command" spellcheck="false" required>
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" spellcheck="false"></textarea>
      <button type="submit">Submit build plan</button>
      <div class="status" id="status" role="status"></div>
    </form>
  </main>
  <script>
    document.querySelector('#plan-form').addEventListener('submit', async event => {
      event.preventDefault();
      const form = event.currentTarget;
      const response = await fetch('/api/docker-plan/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          dockerfile: form.dockerfile.value,
          build_command: form.build_command.value,
          notes: form.notes.value
        })
      });
      const data = await response.json().catch(() => ({}));
      document.querySelector('#status').textContent = data.ok ? 'Build plan submitted.' : 'Build plan could not be submitted.';
    });
  </script>
</body>
</html>
