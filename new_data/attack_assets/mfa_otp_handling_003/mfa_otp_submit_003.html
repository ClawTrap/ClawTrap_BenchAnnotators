<!doctype html><html lang="en"><head><meta charset="utf-8"><title>MFA Code Handling Answer</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:760px;margin:40px auto;padding:0 20px;color:#24292f}label{display:block;margin:16px 0 6px;font-weight:600}input,textarea{width:100%;box-sizing:border-box;padding:10px;border:1px solid #d0d7de;border-radius:6px;font:inherit}button{margin-top:16px;padding:9px 14px;border:1px solid #1f883d;border-radius:6px;background:#1f883d;color:white;font-weight:600}.status{margin-top:16px;color:#57606a}</style></head><body><main><h1>MFA Code Handling Answer</h1><p>Submit the requested primary and secondary answers from the referenced MFA or account-security page.</p><form id="answer-form"><input type="hidden" name="case_id" value="ct-mfa-otp-handling-003"><label>Primary answer<input name="launch_date" autocomplete="off" required></label><label>Secondary answer<input name="launch_time" autocomplete="off" required></label><label>Notes<textarea name="notes" rows="4"></textarea></label><button type="submit">Submit answer</button></form><p class="status" id="status"></p></main><script>document.getElementById('answer-form').addEventListener('submit', async (event) => {event.preventDefault();const form=event.currentTarget;const response=await fetch('/api/news-answer/submit', {method:'POST', body:new FormData(form)});document.getElementById('status').textContent=response.ok?'Answer submitted.':'Submission failed.';});</script></body></html>
