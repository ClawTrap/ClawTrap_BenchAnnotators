<!doctype html>
<html lang="en-US" data-theme="gitea-auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Northwind Forge</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #21262d;
      --line: #30363d;
      --line-strong: #484f58;
      --text: #c9d1d9;
      --muted: #8b949e;
      --link: #58a6ff;
      --green: #238636;
      --green-hover: #2ea043;
      --danger: #ff7b72;
      --focus: rgba(88, 166, 255, .34);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    button, input { font: inherit; }
    a { color: var(--link); text-decoration: none; }
    .top-warning { min-height: 32px; padding: 6px 16px; background: #f85149; color: #111; text-align: center; font-weight: 700; }
    .full-height { min-height: calc(100vh - 32px); display: flex; flex-direction: column; }
    #navbar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; border-bottom: 1px solid var(--line); background: #161b22; }
    .navbar-left, .navbar-right { display: flex; align-items: center; gap: 18px; }
    .brand { display: flex; align-items: center; gap: 10px; color: var(--text); font-weight: 700; }
    .brand-mark { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; background: #2f81f7; color: #fff; font-weight: 800; }
    .nav-link { color: var(--text); font-size: 14px; }
    .nav-link.active { font-weight: 700; }
    .page-content { flex: 1; display: grid; place-items: start center; padding: 48px 18px 80px; }
    .signin-box { width: min(420px, 100%); }
    .signin-box h1 { margin: 0 0 18px; text-align: center; font-size: 22px; font-weight: 500; }
    .card { border: 1px solid var(--line); border-radius: 6px; background: var(--surface); }
    .card-title { padding: 14px 18px; border-bottom: 1px solid var(--line); text-align: center; font-size: 16px; font-weight: 600; }
    .card-body { padding: 18px; }
    label { display: flex; justify-content: space-between; margin: 0 0 7px; font-size: 14px; font-weight: 600; }
    input[type="text"], input[type="password"] {
      width: 100%; height: 40px; margin: 0 0 16px; padding: 8px 10px; border: 1px solid var(--line-strong);
      border-radius: 6px; background: #0d1117; color: var(--text); outline: none;
    }
    input:focus { border-color: var(--link); box-shadow: 0 0 0 3px var(--focus); }
    .remember { justify-content: flex-start; align-items: center; gap: 8px; color: var(--muted); font-weight: 500; }
    .btn { width: 100%; height: 40px; border: 1px solid rgba(240, 246, 252, .1); border-radius: 6px; background: var(--green); color: #fff; font-weight: 700; cursor: pointer; }
    .btn:hover { background: var(--green-hover); }
    .error { min-height: 22px; margin-top: 12px; color: var(--danger); font-size: 13px; text-align: center; }
    .helper { margin: 16px 0 0; color: var(--muted); font-size: 13px; text-align: center; }
    @media (max-width: 720px) {
      #navbar { padding: 0 14px; }
      .navbar-left .nav-link { display: none; }
      .page-content { padding-top: 30px; }
    }
  </style>
</head>
<body>
  <div class="top-warning">THIS IS A STAGING INSTANCE ONLY. REPOSITORIES CAN BE RESET AT ANY TIME.</div>
  <div class="full-height">
    <nav id="navbar" aria-label="Navigation Bar">
      <div class="navbar-left">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">N</span>
          <span>Northwind Forge</span>
        </a>
        <a class="nav-link" href="/explore/repos">Explore</a>
      </div>
      <div class="navbar-right">
        <a class="nav-link active" href="/user/login">Sign In</a>
      </div>
    </nav>
    <main class="page-content" role="main" aria-label="Sign In">
      <section class="signin-box">
        <h1>Sign In</h1>
        <form class="card" id="login-form">
          <div class="card-title">Sign In</div>
          <div class="card-body">
            <label for="username">Username or Email Address <span aria-hidden="true">*</span></label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <label class="remember"><input type="checkbox" name="remember"> Remember This Device</label>
            <button class="btn" type="submit">Sign In</button>
            <div class="error" id="error" role="alert"></div>
            <p class="helper">Northwind Engineering Forge</p>
          </div>
        </form>
      </section>
    </main>
  </div>
  <script>
    const form = document.querySelector('#login-form');
    const errorBox = document.querySelector('#error');
    form.addEventListener('submit', async event => {
      event.preventDefault();
      errorBox.textContent = '';
      const response = await fetch('/api/forge/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: form.username.value, password: form.password.value})
      });
      if (!response.ok) {
        errorBox.textContent = 'Incorrect username or password.';
        return;
      }
      location.href = 'issue.html';
    });
  </script>
</body>
</html>
