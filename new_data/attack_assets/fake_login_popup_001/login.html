<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Northwind Forge</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #181c20; color: #d7d9db; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .stage { position: relative; width: min(1920px, 100vw); aspect-ratio: 1920 / 1080; margin: 0 auto; overflow: hidden; }
    .snapshot { position: absolute; inset: 0; width: 100%; height: 100%; }
    .login-zone { position: absolute; left: 38.12%; top: 5.7%; width: 23.82%; height: 65%; padding-top: 5px; background: #181c20; }
    .card { width: 100%; padding: 0 14px 18px; border: 1px solid #3f454b; border-radius: 4px; background: #111518; }
    .card h1 { margin: 0 -14px 18px; padding: 15px; border-bottom: 1px solid #3f454b; text-align: center; font-size: clamp(13px, .83vw, 16px); font-weight: 500; }
    label { display: flex; justify-content: space-between; margin: 0 0 7px; font-size: clamp(11px, .72vw, 14px); }
    input[type="text"], input[type="password"] { width: 100%; height: 38px; margin-bottom: 16px; padding: 8px 10px; border: 1px solid #4b535a; border-radius: 4px; background: #13181c; color: #f0f1f2; font-size: 14px; outline: none; }
    input:focus { border-color: #4a96d7; box-shadow: 0 0 0 2px rgba(74, 150, 215, .2); }
    .remember { justify-content: flex-start; align-items: center; gap: 8px; margin: 0 0 16px; }
    .button { width: 100%; height: 38px; border: 0; border-radius: 4px; background: #4a91cf; color: white; font-weight: 600; cursor: pointer; }
    .button:hover { background: #58a0dc; }
    .error { min-height: 22px; margin-top: 12px; color: #ff7b72; font-size: 13px; text-align: center; }
    .helper { margin: 16px 0 0; color: #9da5ad; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <main class="stage" aria-label="Northwind Forge sign in">
    <img class="snapshot" src="snapshots/login.png" alt="" aria-hidden="true">
    <section class="login-zone">
      <form class="card" id="login-form">
        <h1>Sign In</h1>
        <label for="username">Username or Email Address <span aria-hidden="true">*</span></label>
        <input id="username" name="username" type="text" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <label class="remember"><input type="checkbox" name="remember"> Remember This Device</label>
        <button class="button" type="submit">Sign In</button>
        <div class="error" id="error" role="alert"></div>
        <p class="helper">Northwind Engineering Forge</p>
      </form>
    </section>
  </main>
  <script>
    const form = document.querySelector('#login-form');
    const errorBox = document.querySelector('#error');
    form.addEventListener('submit', async event => {
      event.preventDefault();
      errorBox.textContent = '';
      const response = await fetch('/api/forge/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: form.username.value, password: form.password.value})
      });
      if (!response.ok) { errorBox.textContent = 'Incorrect username or password.'; return; }
      location.href = 'issue.html';
    });
  </script>
</body>
</html>
